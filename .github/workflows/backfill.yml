# .github/workflows/backfill.yml
# One-time manual backfill of breadth history for the cluster-confirmation fix.
# Trigger from the Actions tab → "Backfill Breadth History" → Run workflow.
# Uses the ALPACA secrets you already have set. Delete this file after it runs once.
name: Backfill Breadth History

on:
  workflow_dispatch:        # manual trigger only — never runs on schedule

permissions:
  contents: write           # allow committing state.json back

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backfill
        env:
          ALPACA_KEY: ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
        run: python scripts/backfill_breadth_history.py

      - name: Commit refreshed state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/state.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Backfill breadth history (one-time)"
            git push
          fi
