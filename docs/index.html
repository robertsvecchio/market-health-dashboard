<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="color-scheme" content="dark"/>
<title>Market Health Dashboard</title>
<style>
:root{
  --bg:#0E1116;--surface:#161B22;--surface2:#1B2128;--border:#232A33;
  --text:#E6EDF3;--muted:#8B949E;--faint:#9AA4AF;
  --low:#3FB950;--moderate:#D8A657;--elevated:#E8833A;--high:#F85149;--info:#58A6FF;
  --mono:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,monospace;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased}
body{padding:env(safe-area-inset-top) 0 calc(env(safe-area-inset-bottom)+24px)}
.wrap{max-width:660px;margin:0 auto;padding:16px}
header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin:8px 2px 14px}
.brand{font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);font-weight:600}
.title{font-size:22px;font-weight:700;letter-spacing:-.01em;margin:2px 0 0}
.updated{font-size:11px;color:var(--faint);margin-top:4px;font-variant-numeric:tabular-nums}
.refresh{appearance:none;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:var(--sans);font-size:13px;font-weight:600;padding:9px 13px;border-radius:10px;cursor:pointer;display:inline-flex;align-items:center;gap:7px;white-space:nowrap}
.refresh:hover{border-color:var(--info)}
.refresh svg{width:14px;height:14px}

/* ── Top tabs (desktop ≥700px) ── */
.tabs-top{display:flex;gap:5px;padding:4px 2px 10px}
.tab{flex:1 1 0;min-width:0;justify-content:center;display:inline-flex;align-items:center;gap:5px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:12px;font-weight:600;padding:8px 8px;border-radius:9px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tab[aria-selected="true"]{color:var(--text);border-color:var(--faint);background:var(--surface2)}
.tab:focus-visible{outline:2px solid var(--info);outline-offset:3px}
.tab .dot{width:6px;height:6px;border-radius:50%;flex:none}

/* ── Bottom nav (mobile <700px) ── */
.tabs-bottom{display:none;position:fixed;bottom:0;left:0;right:0;z-index:40;background:var(--surface);border-top:1px solid var(--border);padding:0 0 env(safe-area-inset-bottom)}
.tabs-bottom .bnav{display:flex;justify-content:space-around}
.tabs-bottom .btab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px 8px;border:none;background:transparent;color:var(--muted);font-size:10px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent}
.tabs-bottom .btab[aria-selected="true"]{color:var(--text)}
.tabs-bottom .btab .dot{width:6px;height:6px;border-radius:50%}

@media(max-width:699px){
  .tabs-top{display:none}
  .tabs-bottom{display:block}
  body{padding-bottom:calc(80px + env(safe-area-inset-bottom))}
}
@media(min-width:700px){
  .tabs-top{display:flex}
  .tabs-bottom{display:none}
}

/* ── Cards ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px}
.card h2{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:600;margin:0 0 12px}

/* ── Sub-score tiles (flex-grow weighted) ── */
.sub-tiles{display:flex;gap:8px;margin-bottom:12px}
.sub-tile{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px 10px 8px;min-width:0}
.sub-tile .st-name{font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sub-tile .st-val{font-family:var(--mono);font-size:20px;font-weight:700;line-height:1}
.sub-tile .st-lbl{font-size:10px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sub-tile .st-wt{font-size:9px;color:var(--faint);margin-top:2px}

/* ── High-signal cards (YC + HY momentum) ── */
.hs-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:12px}
.hs-label{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:8px}
.hs-body{display:flex;align-items:center;gap:12px}
.hs-num{font-family:var(--mono);font-size:32px;font-weight:700;line-height:1;flex:none}
.hs-meta{flex:1;min-width:0}
.hs-sub{font-size:12px;color:var(--muted);margin-top:2px}
.hs-bar-wrap{margin-top:8px}
.hs-bar-track{height:6px;background:var(--surface2);border-radius:3px;position:relative;overflow:visible}
.hs-bar-fill{height:100%;border-radius:3px;position:absolute;left:0;top:0}
.hs-bar-marker{position:absolute;top:-4px;width:3px;height:14px;background:#fff;border-radius:2px;transform:translateX(-50%)}
.hs-arrow{font-size:20px;flex:none}

/* ── Medium-signal 2×2 grid ── */
.med-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.med-tile{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px}
.med-tile .mt-name{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:6px}
.med-tile .mt-val{font-family:var(--mono);font-size:22px;font-weight:700}
.med-tile .mt-sub{font-size:11px;color:var(--muted);margin-top:2px}

/* ── Signal board ── */
.sig-board{display:flex;gap:10px;flex-wrap:wrap;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:12px;align-items:center}
.sig-dot-wrap{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.sig-dot{width:12px;height:12px;border-radius:50%}
.sig-dot-label{font-size:9px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}

/* ── Composite hero ── */
.comp-hero{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 16px 12px;margin-bottom:12px}
.comp-hero-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:4px}
.comp-label{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:600}
.comp-num{font-family:var(--mono);font-size:58px;font-weight:700;line-height:1;letter-spacing:-.02em}
.comp-risk-lbl{font-size:16px;font-weight:700;margin:4px 0 6px}
.comp-regime{font-size:12.5px;margin-bottom:8px}
.comp-trend-tag{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;color:var(--muted);background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:4px 10px}
.ov-meter{position:relative;height:8px;border-radius:5px;margin:12px 0 5px;background:linear-gradient(90deg,var(--low) 0 25%,var(--moderate) 25% 50%,var(--elevated) 50% 65%,var(--high) 65% 100%)}
.ov-marker{position:absolute;top:-5px;width:3px;height:18px;background:#fff;border-radius:2px;box-shadow:0 0 0 2px var(--surface)}
.ov-meter-scale{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--faint)}

/* ── Contrib card ── */
.contrib{margin-top:10px}
.contrib-row{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:13px}
.contrib-name{color:var(--muted);width:110px;flex:none;font-size:12px}
.contrib-wt{font-size:10px;color:var(--faint);width:28px;flex:none;text-align:right}
.contrib-bar{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.contrib-fill{height:100%;border-radius:3px}
.contrib-val{font-family:var(--mono);font-size:12px;width:32px;text-align:right;flex:none}

/* ── Conf card ── */
.conf{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface2);border-radius:10px;border:1px solid var(--border);margin-bottom:12px}
.conf-bar{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.conf-fill{height:100%;border-radius:3px}
.conf-label{font-family:var(--mono);font-size:12px;white-space:nowrap}

/* ── Alerts ── */
.alert{display:flex;gap:10px;align-items:flex-start;padding:10px 0;border-top:1px solid var(--border)}
.alert:first-of-type{border-top:none;padding-top:2px}
.adot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex:none}
.pri{font-family:var(--mono);font-size:10px;font-weight:600;padding:2px 6px;border-radius:5px;margin-left:auto;flex:none}
.pri.HIGH{color:var(--high);background:rgba(248,81,73,.12)}
.pri.MED{color:var(--moderate);background:rgba(216,166,87,.12)}
.empty{color:var(--muted);font-size:13px}

/* ── What's Changed ── */
.wc-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-top:1px solid var(--border);font-size:13.5px}
.wc-row:first-child{border-top:none;padding-top:2px}
.wc-delta{font-family:var(--mono);font-size:12px;margin-left:auto;flex:none}

/* ── Metric rows ── */
.metric{border-top:1px solid var(--border);padding:12px 0}
.metric:first-child{border-top:none}
.mhead{display:flex;align-items:center;gap:6px}
.mname{font-size:14px;font-weight:600;margin-right:2px}
.info{appearance:none;border:1px solid var(--border);background:transparent;color:var(--muted);width:20px;height:20px;border-radius:50%;font-size:11px;font-weight:700;cursor:pointer;flex:none;line-height:1;font-style:italic;padding:0}
.info:hover,.info:focus-visible{border-color:var(--info);color:var(--info);outline:none}
.badge{font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:.04em;padding:2px 5px;border-radius:4px;text-transform:uppercase}
.b-proxy{color:var(--info);background:rgba(88,166,255,.12)}
.b-manual{color:var(--moderate);background:rgba(216,166,87,.12)}
.b-unavailable{color:var(--faint);background:rgba(110,118,129,.1)}
.b-stale{color:var(--high);background:rgba(248,81,73,.12)}
.mval{font-family:var(--mono);font-size:15px;font-variant-numeric:tabular-nums;margin-left:auto;white-space:nowrap;display:flex;align-items:center;gap:5px}
.marrow{font-size:13px}
.mbody{margin-top:9px;font-size:13px;line-height:1.5;color:var(--muted);display:none;padding-left:2px}
.mbody.open{display:block}
.mbody .primer{color:var(--faint)}
.mbody .reading{color:var(--text);margin-top:6px}
.spark{opacity:.6;flex:none}

/* ── Sectors ── */
.phase{font-family:var(--mono);font-size:16px;font-weight:600}
.phase-sub{font-size:11.5px;color:var(--muted);margin-top:2px}
.favored{display:flex;gap:6px;flex-wrap:wrap;margin:12px 0 14px}
.chip{font-family:var(--mono);font-size:11px;font-weight:600;padding:4px 8px;border-radius:7px;background:rgba(63,185,80,.1);color:var(--low);border:1px solid rgba(63,185,80,.25)}
.srow{display:grid;grid-template-columns:34px 1fr 52px;align-items:center;gap:10px;padding:5px 0}
.stk{font-family:var(--mono);font-size:12px;color:var(--muted)}
.sbar{position:relative;height:6px;background:var(--surface2);border-radius:4px}
.sbar i{position:absolute;top:0;bottom:0;border-radius:4px}
.sbar .mid{position:absolute;left:50%;top:-2px;bottom:-2px;width:1px;background:var(--border)}
.sval{font-family:var(--mono);font-size:12px;text-align:right;font-variant-numeric:tabular-nums}
.srow.lead .stk,.srow.lag .stk{color:var(--text);font-weight:600}
.srow.mute{opacity:.4}
.stag{font-size:9px;font-weight:700;letter-spacing:.04em;padding:1px 4px;border-radius:4px;margin-left:6px}

/* ── Hindenburg/Titanic collapsed section ── */
.ht-collapsed{margin-top:16px;padding-top:12px;border-top:1px solid var(--border)}
.ht-label{font-size:10px;color:var(--faint);letter-spacing:.08em;text-transform:uppercase;font-weight:600;margin-bottom:6px}
.ht-note{font-size:11.5px;color:var(--faint);line-height:1.45;margin-bottom:8px}

/* ── Banner ── */
.banner{display:flex;gap:10px;align-items:flex-start;background:rgba(216,166,87,.08);border:1px solid rgba(216,166,87,.25);border-radius:12px;padding:11px 13px;margin-bottom:14px}
.banner svg{width:16px;height:16px;flex:none;margin-top:1px;color:var(--moderate)}
.banner .bt{font-size:12.5px;line-height:1.45}

/* ── Summary & Watch ── */
.summary{font-size:14.5px;line-height:1.55}
.watch div{padding:8px 0;border-top:1px solid var(--border);font-size:13.5px;line-height:1.45}
.watch div:first-child{border-top:none}
.watch .arr{color:var(--info);margin-right:6px}

/* ── Catalyst chips ── */
.cat-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.cat-row::-webkit-scrollbar{display:none}

footer{margin-top:18px;padding:0 2px;color:var(--faint);font-size:11px;line-height:1.6}
.legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:8px}
.legend span{display:inline-flex;align-items:center;gap:5px}
.legend i{width:8px;height:8px;border-radius:2px;display:inline-block}
.lk{color:var(--faint);text-decoration:underline;cursor:pointer;background:none;border:none;font:inherit;padding:0}
#toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);opacity:0;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:11px 16px;border-radius:10px;font-size:13px;max-width:90vw;text-align:center;pointer-events:none;transition:opacity .25s,transform .25s;z-index:50}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.skeleton{color:var(--faint);text-align:center;padding:40px 0;font-size:14px}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <div class="brand">Market Health</div>
      <h1 class="title">Risk Dashboard</h1>
      <div class="updated" id="updated">Loading&hellip;</div>
    </div>
    <button class="refresh" id="refreshBtn">
      <svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 3a5 5 0 1 0 4.546 2.914.75.75 0 0 1 1.364-.626A6.5 6.5 0 1 1 8 1.5V0l3 2.5L8 5V3Z"/></svg>
      Refresh
    </button>
  </header>
  <div class="tabs-top" id="tabs-top" role="tablist"></div>
  <div id="content"><div class="skeleton">Loading market data&hellip;</div></div>
  <footer>
    <div class="legend">
      <span><i style="background:var(--info)"></i>proxy</span>
      <span><i style="background:var(--moderate)"></i>manual</span>
      <span><i style="background:var(--faint)"></i>unavailable</span>
      <span><i style="background:var(--high)"></i>stale</span>
    </div>
    <div id="health"></div>
    <div style="margin-top:8px">Data via FRED, yfinance, Shiller/multpl, Alpaca (S&amp;P 500 internals). Breadth signals are S&amp;P 500 proxies for NYSE-wide indicators. Not investment advice.</div>
    <div style="margin-top:8px"><button class="lk" id="resetToken">Reset refresh token</button></div>
  </footer>
</div>
<nav class="tabs-bottom" id="tabs-bottom" role="tablist">
  <div class="bnav" id="bnav"></div>
</nav>
<div id="toast"></div>
<script>
"use strict";
const REPO="robertsvecchio/market-health-dashboard";
const WORKFLOW="update_dashboard.yml";
const DATA_URL="./data/latest.json";

/* ── Static primers ── */
const PRIMERS={
  // Valuation
  cape:"CAPE = price ÷ 10yr avg real earnings. Long-run avg ~17; above 30 has always preceded a bear eventually. NOT a timing tool — can stay elevated for years. Predicts 10-yr forward returns, not next quarter.",
  buffett_indicator:"US stock market cap ÷ GDP. Above +1 std dev from trend = expensive. Watch the deviation (z-score), not the raw level.",
  excess_cape_yield:"CAPE earnings yield minus real bond yield. Negative = bonds beat stocks on a risk-adjusted basis. Lowest since the dot-com peak.",
  forward_pe:"Price ÷ next-12-month earnings. Long-run mean ~16x. Above 22x = elevated drawdown risk historically. More timely than CAPE but subject to analyst optimism bias.",
  ad_line_proxy:"Equal-weight vs cap-weight S&P. When RSP lags SPY, megacaps are masking weak breadth — a divergence that often precedes turns.",
  // Cycle/Economy
  goldman_composite:"5-input percentile composite: valuation, yield curve, unemployment, inflation, LEI. Above 70 = high-risk historically. Summary gauge, not a timing trigger.",
  lei:"OECD leading indicator for the US. Direction beats level: rising = expansion, falling = softening ahead.",
  lending_standards:"Net % of banks tightening C&I lending — measures credit AVAILABILITY (vs HY spreads = credit price). Above +30% has preceded every US recession since 1990 by 2–4 quarters. Quarterly, lags ~1 month. (FRED DRTSCILM)",
  yield_curve_10y3m:"10yr minus 3mo yield. HIT RATE: inversion preceded all 7 post-WWII recessions, median lead 15 months (range 6–24). One false positive (1998). Most reliable lead signal — but a calendar warning, not a trade trigger.",
  unemployment:"Very low = late-cycle. The danger is the TURN: +0.5pt from 12-mo low triggers the Sahm Rule, which has called every recession onset since 1950.",
  fed_funds:"Fed policy rate. Rate-cut cycles often precede recessions — the Fed cuts because something is breaking, not as a gift to bulls.",
  ppi:"Producer prices (final demand). Leads CPI by 1–3 months — watch for a PPI turn to front-run the inflation narrative shift. (FRED PPIFIS)",
  core_cpi:"Core consumer inflation ex food/energy. Persistent above 3% keeps the Fed tight, which pressures multiples.",
  core_pce:"Fed's preferred inflation gauge. Direction vs 2% drives policy more than any other single number.",
  nfci_leverage:"Chicago Fed financial leverage. Positive = tighter/more leveraged than avg. Buildup raises fragility.",
  hy_oas:"Extra yield for holding junk bonds over Treasuries. Widening = credit stress. Bond market sniffs trouble before equities — watch for spread divergence from equity calm.",
  ig_oas:"IG credit spread. Calmer than HY but widening alongside HY = broad credit tightening.",
  umich_sentiment:"Consumer mood. Sharp drops signal spending pullbacks. Extreme lows (~50s) have historically been contrarian buy signals, not crash confirmations.",
  cc_delinquency:"Credit card past-due rate. Leads the economy — consumer stress shows up here months before GDP.",
  auto_delinquency:"Auto loan delinquencies. Cracks before mortgages; early consumer stress signal.",
  savings_rate:"Personal savings ÷ income. Below 3% + rising delinquencies = spending increasingly debt-funded. Fragile.",
  debt_service:"Household debt payments ÷ disposable income. High = less cushion for shocks.",
  // Technical
  spx_vs_200dma:"S&P 500 vs its 200-day average. Breaks below a flat or falling 200-DMA preceded every bear since 2000.",
  dma200_slope:"Direction of the 200-DMA. Rising = dips buyable. Flat/falling = breaks become structural.",
  weekly_macd:"Weekly trend-momentum. Daily MACD is noise; weekly turning negative preceded every sustained bear since 2000.",
  pct_above_200dma:"% of S&P 500 above their 200-DMA. Above 60% = healthy. Below 40% while index near highs = distribution. Coincident, not leading.",
  mcclellan:"Advances minus declines momentum oscillator. Negative = deteriorating internals. (S&P 500 proxy; needs ~40 days to stabilize.)",
  zweig_adv_ratio:"HIT RATE: Zweig Breadth Thrust has fired ~19 times since WWII — S&P 500 higher 6 AND 12 months later every single time, avg +23% at 12mo. Rare (fires at bottoms), but the most reliable bullish signal in the set. (S&P 500 proxy.)",
  hindenburg_omen_confirmed:"HIT RATE: ~25% preceded a 5%+ decline; ~10% preceded 15%+. 75–80% false alarms. High noise — retained as breadth data only, not an active alert.",
  hindenburg_omen_today:"RAW flag — fires when new highs AND lows both exceed 2.2%, index in uptrend, McClellan negative. Not actionable alone. Retained as breadth data only.",
  titanic_syndrome_confirmed:"No robust published hit-rate study. Retained as breadth data only, not an active alert.",
  titanic_syndrome_today:"RAW flag — fires when new lows outnumber new highs. Retained as breadth data only.",
  // Sentiment
  fear_greed:"CNN's official Fear & Greed Index, scraped directly from CNN's API. 0=Extreme Fear, 100=Extreme Greed. Best used as a CONTRARIAN signal — extremes (<25 or >75) mark emotional turning points.",
  sahm_rule:"HIT RATE: triggered in every US recession since 1950, avg ~3 months in — well before NBER declares. NOT a predictor — a recession-onset confirmation. Trigger = 0.50pp. (FRED SAHMREALTIME)",
  recession_prob:"Chauvet-Piger smoothed recession probability. Above 20% has coincided with every post-WWII recession. (FRED RECPROUSM156N)",
  philly_coincident:"Philly Fed Coincident Index — 4-factor current economic activity. Rising = expanding, falling = contracting. (FRED USPHCI)",
  vix:"Expected 30-day S&P volatility. Concurrent, not leading — spikes with selloffs. Above 40 = capitulation zone. Below 15 = complacency.",
  put_call:"Puts ÷ calls volume. High = fear (contrarian buy). Low = euphoria (contrarian sell).",
  cycle_phase:"Business-cycle phase from LEI + yield curve. Early cycle: financials/discretionary. Mid: tech/industrials. Late: energy/materials. Contraction: defensives.",
  // NEW primers
  margin_debt:"FINRA margin debt (Fed Flow of Funds, quarterly). Rapid YoY rise + rollover historically precedes bear markets — leverage buildup amplifies drawdowns. Quarterly lag ~2–3 months. (FRED BOGZ1FL663067003Q)",
  hy_momentum:"The 90-day rate of change in HY spreads, converted to a 0–100 risk score. Widening >80bps in 90 days has historically preceded credit stress by 3–9 months. The level of spreads can be deceptive (see 2007); the direction is the signal.",
  regime_indicator:"Counts how many of five historically-validated crash precursor conditions are simultaneously active: credit stress, cycle breakdown, yield curve warning, leverage stress, and labor deterioration. Every endogenous US bear market of 20%+ since 1929 occurred with 3 or more conditions active. Exogenous shocks (COVID, geopolitical events) are not predictable by this framework.",
  credit_score:"Weighted composite of SLOOS lending standards (40%), HY spread momentum (35%), and NFCI leverage (25%). Credit signals led the 2008 crash by 12 months via SLOOS and the 2000 crash via spread widening. Highest backtested recession hit rate of the five buckets.",
  cycle_score:"Weighted composite of LEI direction (30%), yield curve risk (30%), Goldman-style cycle composite (30%), and household debt service (10%). LEI declined for 6+ months before every post-1950 US recession. Co-firing bonus applied when LEI and yield curve both signal simultaneously — this combination has 7/8 historical hit rate.",
  valuation_score:"Weighted composite of CAPE (40%), Buffett Indicator z-score (35%), and Excess CAPE Yield (25%). Valuation is a severity amplifier, not a timing tool: CAPE was only 13 at the 1973 crash onset but 44 at the 2000 peak. High CAPE means deeper holes when crashes arrive. Capped at 70 in the composite to prevent structural overvaluation from crowding out time-sensitive signals.",
  breadth_score:"Weighted composite of % of S&P 500 above 200DMA (60%) and McClellan Oscillator (40%). Breadth breakdown (below 40%) is a concurrent or lagging signal — it confirms deterioration already underway, not an early warning. Useful for position sizing, not regime prediction.",
  labor_score:"Weighted composite of Sahm Rule (50%), unemployment trend (30%), and credit card delinquency rate (20%). The Sahm Rule (threshold: 0.5) is the most precise labor signal — it fires at recession onset, not before. Rising delinquencies provide 1–2 quarter lead.",
  composite_score:"A weighted average of five signal categories — credit (30%), cycle (25%), valuation (20%), breadth (15%), and labor (10%). Weights reflect backtested hit rates across 8 US crashes since 1929. Score above 65 has historically coincided with materially elevated drawdown risk. Valuation is capped at 70 before entering the composite to prevent structural overvaluation from dominating time-sensitive signals.",
  sloos:"Net % of banks tightening C&I lending standards (Senior Loan Officer Opinion Survey, quarterly). Above +20% has preceded every US recession since 1990 with a 2–4 quarter lead — the longest-lead economic signal in this dashboard. Above +40% has historically indicated an active credit crunch.",
  hy_oas_detail:"High-yield credit spread: the premium investors demand to hold junk bonds over Treasuries. Long-term average ~4.5–5%. Below 3.5% indicates compressed risk premiums — not safety, but complacency. Spreads were only 2.7% at the Oct 2007 market peak before exploding to 19% within 14 months.",
  yield_curve_overview:"The 10-year minus 3-month Treasury spread. Inverted (below 0) in 7 of 8 major US crashes since 1929 with 6–18 month lead time. Equally important: the re-steepening after an inversion is when recessions historically arrive.",
  signal_board:"Six dots representing each signal category, colored by current stress level. Green (<40): no signal. Amber (40–65): watch. Red (>65): stressed. Tap any dot to navigate to that category's detail tab.",
};

/* ── Investor-risk color scale ── */
function metricRiskColor(key,value,m){
  if(value==null)return null;
  const v=parseFloat(value);
  switch(key){
    case"cape":return v>30?"var(--high)":v>22?"var(--elevated)":v>17?"var(--moderate)":"var(--low)";
    case"buffett_indicator":{const z=m&&m.deviation_z!=null?m.deviation_z:0;return z>2?"var(--high)":z>1?"var(--elevated)":z>0?"var(--moderate)":"var(--low)";}
    case"forward_pe":return v>22?"var(--high)":v>19?"var(--elevated)":v>16?"var(--moderate)":"var(--low)";
    case"hy_oas":return v>7?"var(--high)":v>5?"var(--elevated)":v>3.5?"var(--moderate)":"var(--low)";
    case"ig_oas":return v>1.5?"var(--high)":v>1?"var(--elevated)":v>0.6?"var(--moderate)":"var(--low)";
    case"vix":return v>40?"var(--high)":v>30?"var(--elevated)":v>20?"var(--moderate)":"var(--low)";
    case"nfci_leverage":return v>0.5?"var(--high)":v>0?"var(--elevated)":v>-0.5?"var(--moderate)":"var(--low)";
    case"cc_delinquency":return v>3.5?"var(--high)":v>2.5?"var(--elevated)":v>1.5?"var(--moderate)":"var(--low)";
    case"auto_delinquency":return v>2.5?"var(--high)":v>1.5?"var(--elevated)":v>1?"var(--moderate)":"var(--low)";
    case"debt_service":return v>14?"var(--high)":v>12?"var(--elevated)":v>10?"var(--moderate)":"var(--low)";
    case"goldman_composite":return v>70?"var(--high)":v>50?"var(--elevated)":v>30?"var(--moderate)":"var(--low)";
    case"margin_debt":{const yoy=m&&m.yoy_pct!=null?m.yoy_pct:0;return yoy>40?"var(--high)":yoy>20?"var(--elevated)":yoy>0?"var(--moderate)":"var(--low)";}
    case"hy_momentum":return v>70?"var(--high)":v>55?"var(--elevated)":v>40?"var(--moderate)":"var(--low)";
    case"excess_cape_yield":return v<0?"var(--high)":v<1?"var(--elevated)":v<2?"var(--moderate)":"var(--low)";
    case"yield_curve_10y3m":return v<0?"var(--high)":v<0.5?"var(--elevated)":v<1.5?"var(--moderate)":"var(--low)";
    case"lei":return null;
    case"savings_rate":return v<3?"var(--high)":v<5?"var(--elevated)":v<8?"var(--moderate)":"var(--low)";
    case"umich_sentiment":return v<60?"var(--high)":v<75?"var(--elevated)":v<90?"var(--moderate)":"var(--low)";
    case"pct_above_200dma":return v<40?"var(--high)":v<50?"var(--elevated)":v<60?"var(--moderate)":"var(--low)";
    case"core_pce":case"core_cpi":{const yoy=m&&m.yoy_pct!=null?m.yoy_pct:v;return yoy>4?"var(--high)":yoy>2.5?"var(--elevated)":yoy>1.5?"var(--moderate)":"var(--low)";}
    case"fed_funds":return v>5?"var(--elevated)":v>3?"var(--moderate)":"var(--low)";
    case"unemployment":{const tr=m&&m.trend&&m.trend.direction;return(v<4.5&&tr==="rising")?"var(--elevated)":v>5.5?"var(--elevated)":v>4.5?"var(--moderate)":"var(--low)";}
    case"spx_vs_200dma":return v<-5?"var(--high)":v<0?"var(--elevated)":v>5?"var(--low)":"var(--moderate)";
    case"weekly_macd":return(m&&m.bearish)?"var(--elevated)":"var(--low)";
    default:return null;
  }
}

function arrowColor(key,direction){
  if(!direction||direction==="flat")return"var(--faint)";
  const risingIsBad=["cape","hy_oas","ig_oas","vix","cc_delinquency","auto_delinquency",
    "debt_service","nfci_leverage","unemployment","forward_pe","core_pce","core_cpi","fed_funds","hy_momentum","margin_debt"];
  const risingIsGood=["lei","yield_curve_10y3m","savings_rate","umich_sentiment",
    "pct_above_200dma","excess_cape_yield","spx_vs_200dma"];
  if(risingIsBad.includes(key))return direction==="rising"?"var(--high)":"var(--low)";
  if(risingIsGood.includes(key))return direction==="rising"?"var(--low)":"var(--high)";
  return"var(--faint)";
}

function riskColor(v){if(v==null)return"var(--faint)";if(v<=25)return"var(--low)";if(v<=50)return"var(--moderate)";if(v<=65)return"var(--elevated)";return"var(--high)";}
function num(x,dp){return(x==null||isNaN(x))?"—":Number(x).toFixed(dp==null?2:dp);}
function esc(s){return String(s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}
function el(h){const t=document.createElement("template");t.innerHTML=h.trim();return t.content.firstElementChild;}
function daysBetween(a,b){const x=new Date(a),y=new Date(b);if(isNaN(x)||isNaN(y))return null;return Math.round((y-x)/86400000);}
function arrowChar(m){const d=m&&m.trend&&m.trend.direction;return d==="rising"?"↑":d==="falling"?"↓":d==="flat"?"→":"";}
function badge(status,stale){
  if(stale)return`<span class="badge b-stale">stale</span>`;
  if(!status||status==="ok")return"";
  return`<span class="badge b-${status}">${status}</span>`;
}
function confidenceScore(h){let c=100;c-=(h.unavailable||0)*8;c-=(h.proxy||0)*4;c-=(h.manual||0)*3;return Math.max(0,Math.min(100,c));}

let DATA=null;

/* ── HIST_FIELD mapping ── */
const HIST_FIELD={
  fear_greed:"fear_greed",composite:"composite",structural_score:"structural",
  valuation_score:"valuation_score",cycle_score:"cycle_score",goldman_composite:"goldman",
  cape:"cape",buffett_indicator:"buffett_z",yield_curve_10y3m:"yield_curve",
  hy_oas:"hy_oas",vix:"vix",pct_above_200dma:"pct_above_200",
  // new
  sloos:"sloos",margin_debt:"margin_debt_yoy",margin_debt_yoy:"margin_debt_yoy",
  hy_momentum:"hy_momentum_bps",hy_momentum_bps:"hy_momentum_bps",
  hy_mom_score:"hy_mom_score",
  regime_count:"regime_count",
  credit_score:"credit_score",labor_score:"labor_score",
  breadth_score:"breadth_score",lei_streak:"lei_streak",
};

function sparkSeries(field){
  const hist=DATA.history||[];const out=[];
  for(const h of hist){const v=h[field];if(v!=null&&!isNaN(v))out.push(+v);}
  return out;
}
function sparkline(field,w,h,strokeColor){
  const v=sparkSeries(field);
  if(v.length<4)return "";
  const W=w||58,H=h||16,p=2,n=v.length,mn=Math.min(...v),mx=Math.max(...v),rg=(mx-mn)||1;
  const sc=strokeColor||"var(--muted)";
  let pts="";for(let i=0;i<n;i++){const x=p+(i/(n-1))*(W-2*p);const y=p+(1-(v[i]-mn)/rg)*(H-2*p);pts+=(i?" ":"")+x.toFixed(1)+","+y.toFixed(1);}
  const lx=(W-p).toFixed(1),ly=(p+(1-(v[n-1]-mn)/rg)*(H-2*p)).toFixed(1);
  return `<svg class="spark" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" aria-hidden="true"><polyline points="${pts}" fill="none" stroke="${sc}" stroke-width="1.2"/><circle cx="${lx}" cy="${ly}" r="1.5" fill="var(--text)"/></svg>`;
}

/* ── Metric row ── */
function metric(section,key,label,fmt,readingKey,staleDays){
  const m=(DATA[section]||{})[key];
  const rk=readingKey||key;
  const reading=((DATA.interpretation||{}).readings||{})[rk];
  const primer=PRIMERS[rk];
  const hasBody=!!(primer||reading);
  let valHtml,stale=false,status,valColor=null;

  if(!m||m.status==="unavailable"||m.value==null){
    valHtml=`<span style="color:var(--faint)">—${badge("unavailable",false)}</span>`;
  }else{
    status=m.status;
    if(m.asof){const dd=daysBetween(m.asof,(DATA.meta||{}).generated_utc||new Date().toISOString());stale=dd!=null&&dd>(staleDays||45);}
    valColor=metricRiskColor(rk,m.value,m);
    const aChar=arrowChar(m);
    const aColor=aChar?arrowColor(rk,m.trend&&m.trend.direction):"";
    valHtml=`<span style="${valColor?`color:${valColor}`:""}">${fmt?fmt(m.value,m):esc(m.value)}</span>${aChar?`<span class="marrow" style="color:${aColor}">${aChar}</span>`:""}`;
  }

  const _sf=HIST_FIELD[rk]||HIST_FIELD[key];
  if(_sf&&m&&m.value!=null){const _sp=sparkline(_sf);if(_sp)valHtml=_sp+valHtml;}
  const bdg=badge(status,stale);
  const card=el(`<div class="metric">
    <div class="mhead">
      <span class="mname">${esc(label)}</span>
      ${hasBody?`<button class="info" aria-label="Explain ${esc(label)}" aria-expanded="false">i</button>`:""}
      ${bdg?`<span style="margin-left:2px">${bdg}</span>`:""}
      <span class="mval">${valHtml}</span>
    </div>
    ${hasBody?`<div class="mbody" role="region">
      ${primer?`<div class="primer">${esc(primer)}</div>`:""}
      ${reading?`<div class="reading"><b>Today:</b> ${esc(reading)}</div>`:""}
    </div>`:""}
  </div>`);

  if(hasBody){
    const btn=card.querySelector(".info"),body=card.querySelector(".mbody");
    btn.addEventListener("click",()=>{const open=body.classList.toggle("open");btn.setAttribute("aria-expanded",open);});
  }
  return card;
}

function mList(specs){
  const c=el(`<div class="card"></div>`);
  specs.forEach(s=>{
    if(s.h){c.appendChild(el(`<h2 style="margin-top:${s.first?"0":"10px"}">${s.h}</h2>`));return;}
    c.appendChild(metric(s.sec,s.key,s.label,s.fmt,s.rk,s.stale));
  });
  return c;
}

/* ── Confidence card ── */
function confCard(){
  const h=DATA.source_health||{};
  const score=confidenceScore(h);
  const lbl=score>=85?"Strong":score>=65?"Medium":score>=40?"Weak":"Limited";
  const col=score>=85?"var(--low)":score>=65?"var(--moderate)":score>=40?"var(--elevated)":"var(--high)";
  const issues=[];
  if(h.unavailable)issues.push(`${h.unavailable} unavailable`);
  if(h.proxy)issues.push(`${h.proxy} proxy`);
  if(h.manual)issues.push(`${h.manual} manual`);
  const c=el(`<div class="card"><h2>Model Confidence</h2></div>`);
  c.appendChild(el(`<div class="conf">
    <span class="conf-label" style="color:${col}">${lbl} ${score}%</span>
    <div class="conf-bar"><div class="conf-fill" style="width:${score}%;background:${col}"></div></div>
    <span class="conf-label" style="color:var(--faint)">${issues.join(" · ")||"All sources live"}</span>
  </div>`));
  return c;
}

/* ── Score contribution waterfall (5-bucket) ── */
function contribCard(){
  const sc=DATA.scores||{};
  const buckets=[
    {key:"credit_score",  label:"Credit",    weight:30},
    {key:"cycle_score",   label:"Cycle",     weight:25},
    {key:"valuation_score",label:"Valuation",weight:20},
    {key:"breadth_score", label:"Breadth",   weight:15},
    {key:"labor_score",   label:"Labor",     weight:10},
  ];
  const available=buckets.filter(b=>sc[b.key]&&sc[b.key].value!=null);
  if(!available.length)return null;
  // Weighted contribution = score * weight / 100
  const maxContrib=Math.max(...available.map(b=>b.weight/100*sc[b.key].value),1);
  const c=el(`<div class="card"><h2>Score Contributors</h2><div class="contrib"></div></div>`);
  const box=c.querySelector(".contrib");
  available.forEach(b=>{
    const v=sc[b.key].value;
    const contrib=v*b.weight/100;
    const w=contrib/maxContrib*100;
    const col=v>70?"var(--high)":v>50?"var(--elevated)":v>30?"var(--moderate)":"var(--low)";
    box.appendChild(el(`<div class="contrib-row">
      <span class="contrib-name">${esc(b.label)}</span>
      <span class="contrib-wt">${b.weight}%</span>
      <div class="contrib-bar"><div class="contrib-fill" style="width:${w}%;background:${col}"></div></div>
      <span class="contrib-val" style="color:${col}">${num(v,0)}</span>
    </div>`));
  });
  return c;
}

/* ── Derive alerts — Tier-1 signal alerts + composite-level alerts ── */
function deriveAlerts(d){
  const m=d.macro||{},s=d.scores||{},se=d.sentiment||{},b=d.breadth||{},st=d.structural||{};
  const regime=d.regime||{};

  // ── Tier-1 alerts — fire independently of composite score ──
  const tier1=[];
  const ycv=m.yield_curve_10y3m&&m.yield_curve_10y3m.value!=null?m.yield_curve_10y3m.value:null;
  const cyclePostInv=(s.cycle_score||{}).post_inversion===true;
  if(ycv!=null&&ycv<0)
    tier1.push({txt:"Yield curve inverted — 7/8 historical crashes preceded by this signal",pri:"HIGH",tier1:true});
  else if(ycv!=null&&ycv>=0&&cyclePostInv)
    tier1.push({txt:"Yield curve re-steepening after inversion — historically the danger zone",pri:"MED",tier1:true});
  const leiStreak=m.lei_decline_streak;
  if(leiStreak&&leiStreak.alert){
    const n=leiStreak.value||0;
    tier1.push({txt:`LEI declining ${n} consecutive months — recession precursor`,
      pri:n>=6?"HIGH":"MED",tier1:true});
  }
  const sloos=m.lending_standards;
  if(sloos&&sloos.value!=null&&sloos.value>20){
    const sv=sloos.value;
    tier1.push({txt:`SLOOS at ${num(sv,1)}% — above historical recession threshold`,
      pri:sv>40?"HIGH":"MED",tier1:true});
  }
  const sahm=m.sahm_rule;
  if(sahm&&sahm.value!=null&&sahm.value>=0.5)
    tier1.push({txt:`Sahm Rule triggered at ${num(sahm.value,2)} — recession onset signal`,pri:"HIGH",tier1:true});
  const hym=m.hy_momentum;
  if(hym&&hym.change_90d_bps!=null&&hym.change_90d_bps>80){
    const bps=hym.change_90d_bps;
    tier1.push({txt:`HY spreads widened ${num(bps,0)}bps in 90 days — credit stress signal`,
      pri:bps>150?"HIGH":"MED",tier1:true});
  }

  // ── Composite-level alerts ──
  const out=[];
  if(ycv!=null){
    if(ycv<0)out.push({txt:"Yield curve inverted (10y–3m below zero)",pri:"HIGH"});
    else if(ycv<0.5)out.push({txt:`Yield curve flat (${num(ycv,2)})`,pri:"MED"});
  }
  const hy=m.hy_oas;
  if(hy&&hy.value!=null&&hy.value>=5)out.push({txt:`Credit spreads widening (HY OAS ${num(hy.value,2)}%)`,pri:hy.value>=7?"HIGH":"MED"});
  const g=s.goldman_composite;
  if(g&&g.value!=null){
    if(g.above_70||g.value>70)out.push({txt:`Goldman composite above 70 (${num(g.value,0)})`,pri:"HIGH"});
    else if(g.above_50||g.value>50)out.push({txt:`Goldman composite above 50 (${num(g.value,0)})`,pri:"MED"});
  }
  // Composite crossing 65 → High Risk zone
  const cv=(s.composite||{}).value;
  if(cv!=null&&cv>=65)out.push({txt:`Composite entered High Risk zone (${num(cv,0)}/100)`,pri:"HIGH"});
  const vix=se.vix;
  if(vix&&vix.value!=null){
    if(vix.above_40||vix.value>40)out.push({txt:`VIX above 40 (${num(vix.value,1)})`,pri:"HIGH"});
    else if(vix.above_30||vix.value>30)out.push({txt:`VIX above 30 (${num(vix.value,1)})`,pri:"MED"});
  }
  const pa=b.pct_above_200dma;
  if(pa&&pa.below_40)out.push({txt:`Only ${num(pa.value,0)}% of S&P 500 above 200-DMA`,pri:"HIGH"});
  const rc=regime.conditions_active||0;
  if(rc>=3)out.push({txt:`Regime: ${rc}/5 conditions active — ${regime.label||""}`,pri:"HIGH"});
  else if(rc>=1)out.push({txt:`Regime: ${rc}/5 conditions active — ${regime.label||""}`,pri:"MED"});
  if(st.excess_cape_yield&&(st.excess_cape_yield.low||st.excess_cape_yield.value<1))
    out.push({txt:"Excess CAPE Yield low — stocks expensive vs bonds",pri:"MED"});
  if(st.ad_line_proxy&&st.ad_line_proxy.bearish_divergence)
    out.push({txt:"Breadth divergence — equal-weight lagging cap-weight",pri:"MED"});
  const un=m.unemployment;
  if(un&&un.value!=null&&un.trend&&un.trend.direction==="rising"&&un.value<5)
    out.push({txt:`Unemployment rising (${num(un.value,1)}%) — late-cycle signal`,pri:"MED"});
  const cc=m.cc_delinquency;
  if(cc&&cc.value!=null&&cc.trend&&cc.trend.direction==="rising"&&cc.value>2.5)
    out.push({txt:`Credit-card delinquencies rising (${num(cc.value,2)}%)`,pri:"MED"});

  const ord={HIGH:0,MED:1};
  tier1.sort((a,b)=>ord[a.pri]-ord[b.pri]);
  out.sort((a,b)=>ord[a.pri]-ord[b.pri]);
  // Return tier1 first, then composite, with a flag so the renderer can add a sub-header
  return {tier1, composite:out};
}

/* ── Tab risk scores (mapped to new sub-scores) ── */
function tabRisk(id){
  const g=(s,k)=>{const m=(DATA[s]||{})[k];return m?m.value:null;};
  if(id==="overview")return g("scores","composite");
  if(id==="credit")return g("scores","credit_score");
  if(id==="economy")return g("scores","cycle_score");
  if(id==="valuation")return g("scores","valuation_score");
  if(id==="technical")return g("scores","breadth_score");
  return null;
}

/* ── High-signal card (Yield Curve or HY Momentum) ── */
function highSignalCard(title, value, unit, dirArrow, dirColor, sub, histField, lo, hi, primerKey){

  const pct=(value!=null&&hi>lo)?Math.max(0,Math.min(100,(value-lo)/(hi-lo)*100)):null;

  c.innerHTML=`<div class="hs-label">${esc(title)}</div>`;
  const body=el(`<div class="hs-body"></div>`);
  const col=dirColor||"var(--faint)";
  body.innerHTML=`
    <div class="hs-num" style="color:${col}">${value!=null?num(value,2)+"":"—"}<span style="font-size:14px;color:var(--muted)">${esc(unit||"")}</span></div>
    <div class="hs-meta">
      <div style="font-size:13px;color:${col};font-weight:600">${esc(sub||"")}</div>
      ${hist.length>=4?`<svg width="100%" height="24" viewBox="0 0 120 24" preserveAspectRatio="none" style="display:block;margin-top:4px">${(()=>{const n=hist.length,mn=Math.min(...hist),mx=Math.max(...hist),rg=(mx-mn)||1,p=2;let pts="";for(let i=0;i<n;i++){const x=p+(i/(n-1))*(120-2*p);const y=p+(1-(hist[i]-mn)/rg)*(24-2*p);pts+=(i?" ":"")+x.toFixed(1)+","+y.toFixed(1);}return`<polyline points="${pts}" fill="none" stroke="${col}" stroke-width="1.4" opacity=".6"/>`;})()}</svg>`:""}
      ${pct!=null?`<div class="hs-bar-wrap"><div class="hs-bar-track" style="background:var(--surface2)"><div class="hs-bar-fill" style="width:${pct}%;background:${col}"></div><div class="hs-bar-marker" style="left:${pct}%"></div></div><div style="display:flex;justify-content:space-between;font-size:9px;color:var(--faint);margin-top:2px"><span>${num(lo,2)}</span><span>${num(hi,2)}</span></div></div>`:""}
    </div>
    <div class="hs-arrow" style="color:${col}">${esc(dirArrow||"")}</div>`;
  c.appendChild(body);
  if(primerKey&&PRIMERS[primerKey]){
    const pb=el(`<div style="margin-top:8px;font-size:11.5px;color:var(--faint);line-height:1.45">${esc(PRIMERS[primerKey])}</div>`);
    c.appendChild(pb);
  }
  return c;
}

/* ── Overview panel ── */
function panelOverview(){
  const c=document.createDocumentFragment();
  const issues=[];
  const cape=(DATA.structural||{}).cape;
  if(cape&&cape.status==="unavailable")issues.push("valuation layer limited");
  const bu=(DATA.breadth||{}).pct_above_200dma;
  if(bu&&bu.universe&&bu.universe<400)issues.push(`breadth on ${bu.universe} names`);

  // ── Composite hero card ──

    {key:"yield_curve",    label:"Yield Curve",      def:"Currently inverted OR re-steepening after inversion"},
    {key:"leverage_stress",label:"Leverage Stress",  def:"Margin debt YoY >40% AND rolling over (falling)"},
    {key:"labor",          label:"Labor Deterioration",def:"Sahm Rule ≥ 0.5 (recession onset signal)"},
  ];
  condDefs.forEach(cd=>{
    const active=regimeConds[cd.key]===true;
    const col=active?"var(--high)":"var(--low)";
    const r=el(`<div style="border-top:1px solid var(--border);padding:7px 0;display:flex;align-items:center;gap:10px"></div>`);
    r.innerHTML=`<span style="width:8px;height:8px;border-radius:50%;background:${col};flex:none;display:inline-block"></span>
      <div>
        <div style="font-size:12px;font-weight:600;color:${active?col:"var(--text)"}">${esc(cd.label)} ${active?"● ACTIVE":""}</div>
        <div style="font-size:11px;color:var(--faint)">${esc(cd.def)}</div>
      </div>`;
    regimeDiv.appendChild(r);
  });
  const regimeSummary=(DATA.regime||{});
  regimeDiv.appendChild(el(`<div style="margin-top:8px;font-size:12px;color:var(--muted)">${esc(regimeSummary.context||"")} ${esc(regimeSummary.threshold_note||"")}</div>`));
  methBody.appendChild(regimeDiv);

  // Section 4: Historical backtest matrix (static)
  const crashDiv=el(`<div style="margin-bottom:16px"><div style="font-size:12px;font-weight:700;color:var(--text);margin-bottom:8px">Historical Crash Matrix</div></div>`);
  const crashes=[
    ["1929","−89%","~32","no data","n/a","Inverted 1928"],
    ["1937","−49%","~22","no data","n/a","Inverted 1937"],
    ["1973","−48%","~13","Widening","Severe","Inverted 1973"],
    ["1980","−27%","~9","Widening","Severe","Inverted (−3.1%)"],
    ["1987","−34%","~19","Rising","Loose","Positive (+2%)"],
    ["1990","−20%","~17","Widening","Tightening","Inverted 1989"],
    ["2000","−49%","44","510bps","Moderate","Inverted Feb 2000"],
    ["2008","−57%","27","270bps (tight!)","Severe 12mo lead","Inverted 2006"],
  ];
  const table=el(`<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:11px"></div>`);
  const thead=el(`<thead><tr style="color:var(--faint)"></tr></thead>`);
  ["Year","Draw","CAPE","HY OAS","SLOOS","Yield Curve"].forEach(h=>{
    const th=document.createElement("th");
    th.style.cssText="text-align:left;padding:4px 6px;border-bottom:1px solid var(--border);white-space:nowrap";
    th.textContent=h;thead.querySelector("tr").appendChild(th);
  });
  table.querySelector("table")?.appendChild(thead)||table.appendChild(thead);
  const tbody=document.createElement("tbody");
  crashes.forEach((row,ri)=>{
    const tr=document.createElement("tr");
    tr.style.background=ri%2===0?"transparent":"rgba(255,255,255,.02)";
    row.forEach(cell=>{
      const td=document.createElement("td");
      td.style.cssText="padding:4px 6px;border-bottom:1px solid var(--border);color:var(--muted)";
      td.textContent=cell;tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  crashDiv.appendChild(el(`<div style="overflow-x:auto"></div>`));
  crashDiv.lastChild.appendChild(table);
  crashDiv.appendChild(el(`<div style="font-size:11px;color:var(--faint);margin-top:6px">1987 is the only crash where yield curve was NOT inverted and SLOOS was NOT tightening. It recovered within 2 years without a recession. Every other crash with 3+ conditions produced a recession and multi-year bear market.</div>`));
  methBody.appendChild(crashDiv);

  // Section 5: Known limitations
  const limDiv=el(`<div style="margin-bottom:12px"><div style="font-size:12px;font-weight:700;color:var(--text);margin-bottom:8px">Known Limitations</div></div>`);
  ["Exogenous shocks (COVID, geopolitical events, pandemics) are not predictable by this framework — the regime conditions are endogenous stress indicators.",
   "This framework identifies risk levels, not timing. Markets can remain elevated for 12–24 months after conditions activate.",
   "Several series have data lags: SLOOS (quarterly, ~1 month lag), margin debt (quarterly, ~2-3 month lag), CAPE (monthly).",
   "Breadth data is an S&P 500 proxy for NYSE-wide indicators — the true Hindenburg/Titanic signals require NYSE data.",
   "Structural shifts (AI productivity boom, demographics, fiscal regime changes) may alter historical relationships going forward."
  ].forEach(lim=>{
    limDiv.appendChild(el(`<div style="padding:5px 0;border-top:1px solid var(--border);font-size:12px;color:var(--faint);line-height:1.5">• ${esc(lim)}</div>`));
  });
  methBody.appendChild(limDiv);

  // Footer
  methBody.appendChild(el(`<div style="font-size:11px;color:var(--faint);padding-top:8px;border-top:1px solid var(--border)">Built by Robert Svecchio · Data: FRED, yfinance, Shiller, Alpaca · Last updated: ${esc((DATA.meta||{}).generated_display||"—")}</div>`));

  methBtn.addEventListener("click",()=>{
    const open=methBody.style.display==="none";
    methBody.style.display=open?"block":"none";
    methBtn.setAttribute("aria-expanded",open);
    methBtn.querySelector(".meth-chevron").textContent=open?"▴":"▾";
  });
  methCard.appendChild(methBtn);
  methCard.appendChild(methBody);
  c.appendChild(methCard);

  c.appendChild(confCard());
  return c;
}

/* ── Economy tab (was Cycle — absorbs Sectors) ── */
function panelEconomy(){
  const c=document.createDocumentFragment();
  c.appendChild(mList([
    {h:"Recession Composite",first:true},
    {sec:"scores",key:"goldman_composite",label:"Goldman Bear-Market Risk",fmt:v=>num(v,0)+" / 100",rk:"goldman_composite"},
    {sec:"macro",key:"recession_prob",label:"Recession Probability (Chauvet-Piger)",fmt:v=>num(v,1)+"%",stale:75},
    {sec:"macro",key:"sahm_rule",label:"Sahm Rule",fmt:v=>num(v,2)+"pp"+" (trigger ≥0.5)",stale:45},
    {sec:"macro",key:"philly_coincident",label:"Philly Fed Coincident Index (SCI)",fmt:(v,m)=>num(v,1)+(m.trend&&m.trend.direction?" "+{rising:"↑",falling:"↓",flat:"→"}[m.trend.direction]:""),stale:45},
    {h:"Leading & Rates"},
    {sec:"macro",key:"lei",label:"Leading Indicator (OECD CLI)",fmt:v=>num(v,1),stale:75},
    {sec:"macro",key:"yield_curve_10y3m",label:"Yield Curve 10y–3m",fmt:v=>num(v,2),stale:14},
    {sec:"macro",key:"fed_funds",label:"Fed Funds Rate",fmt:v=>num(v,2)+"%",stale:30},
    {h:"Inflation & Labor"},
    {sec:"macro",key:"ppi",label:"PPI — Final Demand (leads CPI)",fmt:(v,m)=>m.yoy_pct!=null?num(m.yoy_pct,1)+"% YoY":num(v,1),stale:45},
    {sec:"macro",key:"core_pce",label:"Core PCE (inflation)",fmt:(v,m)=>m.yoy_pct!=null?num(m.yoy_pct,1)+"% YoY":num(v,1),stale:75},
    {sec:"macro",key:"core_cpi",label:"Core CPI (inflation)",fmt:(v,m)=>m.yoy_pct!=null?num(m.yoy_pct,1)+"% YoY":num(v,1),stale:75},
    {sec:"macro",key:"unemployment",label:"Unemployment",fmt:v=>num(v,1)+"%",stale:75},
    {sec:"macro",key:"avg_hourly_earnings",label:"Avg Hourly Earnings",fmt:v=>num(v,2),stale:75},
    {h:"Consumer Stress"},
    {sec:"macro",key:"auto_delinquency",label:"Auto-Loan Delinquency",fmt:v=>num(v,2)+"%",stale:220},
    {sec:"macro",key:"savings_rate",label:"Personal Savings Rate",fmt:v=>num(v,1)+"%",stale:75},
  ]));
  // Sector Rotation (moved here from its own tab)
  const ph=(DATA.sectors||{}).cycle_phase||{};
  const rs=(DATA.sectors||{}).relative_strength||{};
  const card=el(`<div class="card"><h2>Sector Rotation</h2></div>`);
  const phDiv=el(`<div style="margin-bottom:4px"><div style="display:flex;align-items:center;gap:6px"><span class="phase">${esc(ph.value||"—")}</span><button class="info" aria-label="Explain cycle phase" aria-expanded="false">i</button></div><div class="phase-sub">LEI ${esc(ph.lei_direction||"—")} · 10y–3m ${ph.yield_curve!=null?num(ph.yield_curve,2):"—"}</div></div>`);
  const phBtn=phDiv.querySelector(".info");
  const phBody=el(`<div class="mbody" style="margin-bottom:8px">${PRIMERS.cycle_phase?`<div class="primer">${esc(PRIMERS.cycle_phase)}</div>`:""}</div>`);
  phBtn.addEventListener("click",()=>{const o=phBody.classList.toggle("open");phBtn.setAttribute("aria-expanded",o);});
  card.appendChild(phDiv);card.appendChild(phBody);
  if(ph.favored_sectors&&ph.favored_sectors.length)
    card.appendChild(el(`<div class="favored">${ph.favored_sectors.map(t=>`<span class="chip">${esc(t)}</span>`).join("")}</div>`));
  const arr=Object.keys(rs).map(k=>({tk:k,...rs[k]})).filter(x=>x.value!=null).sort((a,b)=>b.value-a.value);
  if(arr.length){
    const CYC=["XLK","XLY","XLF","XLI"],DEF=["XLU","XLP","XLV"];
    const avg=set=>{const xs=arr.filter(x=>set.includes(x.tk)).map(x=>x.value);return xs.length?xs.reduce((a,b)=>a+b,0)/xs.length:null;};
    const cy=avg(CYC),df=avg(DEF);
    if(cy!=null&&df!=null){
      let txt,col;
      if(cy-df>1){txt="Risk-on — cyclicals leading";col="var(--low)";}
      else if(df-cy>1){txt="Risk-off — defensives leading (late-cycle tell)";col="var(--high)";}
      else{txt="Mixed / rotating — no clear leadership";col="var(--muted)";}
      card.appendChild(el(`<div class="srow" style="grid-template-columns:1fr auto;padding:2px 0 8px"><div style="font-size:13px;font-weight:600;color:${col}">${esc(txt)}</div><div class="phase-sub">cyc ${cy>=0?"+":""}${num(cy,1)} vs def ${df>=0?"+":""}${num(df,1)}</div></div>`));
    }
    const max=Math.max(...arr.map(x=>Math.abs(x.value)),1);
    const n=arr.length;
    arr.forEach((x,i)=>{
      const w=Math.abs(x.value)/max*50;
      const col=x.value>=0?"var(--low)":"var(--high)";
      const isLead=i<3,isLag=i>=n-3;
      const cls=isLead?"srow lead":isLag?"srow lag":"srow mute";
      const tag=isLead?`<span class="stag" style="background:var(--low);color:#04140b">LEAD</span>`:isLag?`<span class="stag" style="background:var(--high);color:#1a0606">LAG</span>`:"";
      card.appendChild(el(`<div class="${cls}">
        <div class="stk">${esc(x.tk)}${tag}</div>
        <div class="sbar"><i style="left:${x.value>=0?"50%":(50-w)+"%"};width:${w}%;background:${col}"></i><span class="mid"></span></div>
        <div class="sval" style="color:${col}">${x.value>=0?"+":""}${num(x.value,1)}</div>
      </div>`));
    });
    card.appendChild(el(`<div class="phase-sub" style="margin-top:8px">3-month relative strength vs SPY (pct pts)</div>`));
  }
  c.appendChild(card);
  return c;
}

/* ── Tab definitions ── */
const TABS=[
  {id:"overview",  label:"Overview",  render:panelOverview},
  {id:"credit",    label:"Credit",    render:panelCredit},
  {id:"economy",   label:"Economy",   render:panelEconomy},
  {id:"valuation", label:"Valuation", render:panelValuation},
  {id:"technical", label:"Technical", render:panelTechnical},
];
let activeTab="overview";

function renderAll(){
  // Top tabs
  const topBar=document.getElementById("tabs-top");
  topBar.innerHTML="";
  TABS.forEach(t=>{
    const risk=tabRisk(t.id);
    const dot=risk==null?"var(--faint)":riskColor(risk);
    const b=el(`<button class="tab" role="tab" aria-selected="${t.id===activeTab}"><span class="dot" style="background:${dot}"></span>${t.label}</button>`);
    b.addEventListener("click",()=>{activeTab=t.id;renderAll();window.scrollTo(0,0);});
    topBar.appendChild(b);
  });
  // Bottom nav
  const bnav=document.getElementById("bnav");
  bnav.innerHTML="";
  TABS.forEach(t=>{
    const risk=tabRisk(t.id);
    const dot=risk==null?"var(--faint)":riskColor(risk);
    const b=el(`<button class="btab" role="tab" aria-selected="${t.id===activeTab}">
      <span class="dot" style="background:${dot}"></span>
      <span>${t.label}</span>
    </button>`);
    b.addEventListener("click",()=>{activeTab=t.id;renderAll();window.scrollTo(0,0);});
    bnav.appendChild(b);
  });
  // Panel
  const content=document.getElementById("content");
  content.innerHTML="";
  const tab=TABS.find(x=>x.id===activeTab)||TABS[0];
  content.appendChild(tab.render());
  const h=DATA.source_health||{};
  document.getElementById("health").textContent=`Sources: ${h.ok||0} live · ${h.proxy||0} proxy · ${h.manual||0} manual · ${h.unavailable||0} unavailable`;
}

function toast(msg,ms){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");clearTimeout(toast._t);toast._t=setTimeout(()=>t.classList.remove("show"),ms||3500);}

async function load(){
  try{
    const r=await fetch(DATA_URL+"?t="+Date.now(),{cache:"no-store"});
    if(!r.ok)throw new Error("HTTP "+r.status);
    DATA=await r.json();
    document.getElementById("updated").textContent="Updated "+((DATA.meta||{}).generated_display||"—");
    renderAll();
  }catch(e){
    document.getElementById("content").innerHTML=`<div class="card"><h2>Couldn't load data</h2><div class="empty">${esc(e.message)}. Try Refresh, then reload in ~2 minutes.</div></div>`;
  }
}

const TKEY="mhd_gh_pat";
async function doRefresh(){
  let pat=localStorage.getItem(TKEY);
  if(!pat){pat=prompt("Paste your GitHub token (stored on this device only):");if(!pat)return;pat=pat.trim();localStorage.setItem(TKEY,pat);}
  toast("Starting refresh…",2500);
  try{
    const r=await fetch(`https://api.github.com/repos/${REPO}/actions/workflows/${WORKFLOW}/dispatches`,
      {method:"POST",headers:{Authorization:"Bearer "+pat,Accept:"application/vnd.github+json","X-GitHub-Api-Version":"2022-11-28"},body:JSON.stringify({ref:"main"})});
    if(r.status===204)toast("Refresh started — reload in ~1–2 min.",5000);
    else if(r.status===401||r.status===403){localStorage.removeItem(TKEY);toast("Token rejected. Tap Refresh to re-enter.",5000);}
    else toast("Refresh failed (HTTP "+r.status+").",4000);
  }catch(e){toast("Network error triggering refresh.",4000);}
}
document.getElementById("refreshBtn").addEventListener("click",doRefresh);
document.getElementById("resetToken").addEventListener("click",()=>{localStorage.removeItem(TKEY);toast("Stored token cleared.",2500);});
load();
