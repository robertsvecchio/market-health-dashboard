<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="color-scheme" content="dark"/>
<title>Market Health Dashboard</title>
<style>
:root{
  --bg:#0E1116;--surface:#161B22;--surface2:#1B2128;--border:#232A33;
  --text:#E6EDF3;--muted:#8B949E;--faint:#9AA4AF;
  --low:#3FB950;--moderate:#D8A657;--elevated:#E8833A;--high:#F85149;--info:#58A6FF;
  --mono:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,monospace;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased}
body{padding:env(safe-area-inset-top) 0 calc(env(safe-area-inset-bottom)+24px)}
.wrap{max-width:660px;margin:0 auto;padding:16px}
header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin:8px 2px 14px}
.brand{font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);font-weight:600}
.title{font-size:22px;font-weight:700;letter-spacing:-.01em;margin:2px 0 0}
.updated{font-size:11px;color:var(--faint);margin-top:4px;font-variant-numeric:tabular-nums}
.refresh{appearance:none;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:var(--sans);font-size:13px;font-weight:600;padding:9px 13px;border-radius:10px;cursor:pointer;display:inline-flex;align-items:center;gap:7px;white-space:nowrap}
.refresh:hover{border-color:var(--info)}
.refresh svg{width:14px;height:14px}
.tabs{display:flex;gap:5px;padding:4px 2px 10px}
.tab{flex:1 1 0;min-width:0;justify-content:center}
.tab{display:inline-flex;align-items:center;gap:5px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:12px;font-weight:600;padding:8px 8px;border-radius:9px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tab[aria-selected="true"]{color:var(--text);border-color:var(--faint);background:var(--surface2)}
.tab:focus-visible{outline:2px solid var(--info);outline-offset:3px}
.tab .dot{width:6px;height:6px;border-radius:50%;flex:none}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px}
.card h2{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:600;margin:0 0 12px}
.score-num{font-family:var(--mono);font-size:54px;font-weight:600;line-height:1;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
.score-den{font-family:var(--mono);font-size:18px;color:var(--faint)}
.score-label{font-size:15px;font-weight:700;margin-top:2px}
.meter{position:relative;height:10px;border-radius:6px;margin:16px 0 6px;opacity:.9;background:linear-gradient(90deg,var(--low) 0 25%,var(--moderate) 25% 50%,var(--elevated) 50% 75%,var(--high) 75% 100%)}
.meter-marker{position:absolute;top:-5px;width:3px;height:20px;background:#fff;border-radius:2px;box-shadow:0 0 0 2px var(--surface),0 1px 4px rgba(0,0,0,.6)}
.meter-scale{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;color:var(--faint)}
.subs{display:grid;grid-template-columns:1fr 1fr;gap:12px}
/* ── redesigned overview ── */
.ov-hero{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.ov-score-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 16px 12px}
.ov-score-label{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:10px}
.ov-big-num{font-family:var(--mono);font-size:58px;font-weight:700;line-height:1;letter-spacing:-.02em}
.ov-risk-label{font-size:16px;font-weight:700;margin:4px 0 10px}
.ov-trend-tag{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;color:var(--muted);background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:4px 10px}
.ov-meter{position:relative;height:8px;border-radius:5px;margin:14px 0 5px;background:linear-gradient(90deg,var(--low) 0 25%,var(--moderate) 25% 50%,var(--elevated) 50% 75%,var(--high) 75% 100%)}
.ov-marker{position:absolute;top:-5px;width:3px;height:18px;background:#fff;border-radius:2px;box-shadow:0 0 0 2px var(--surface)}
.ov-meter-scale{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--faint);margin-bottom:0}
/* odometer */
.od-wrap{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;display:flex;flex-direction:column;align-items:center}
.od-title{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:600;align-self:flex-start;margin-bottom:8px}
/* key drivers */
.kd-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:12px}
.kd-tile{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px 10px 8px;cursor:default}
.kd-name{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:5px}
.kd-val{font-size:13px;font-weight:700}
.kd-spark{margin-top:5px;opacity:.5}
/* what changed */
.wc-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-top:1px solid var(--border);font-size:13.5px}
.wc-row:first-child{border-top:none;padding-top:2px}
.wc-arr{font-size:15px;flex:none}
.wc-delta{font-family:var(--mono);font-size:12px;margin-left:auto;flex:none}
/* catalyst row */
.cat-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.cat-row::-webkit-scrollbar{display:none}
.cat-chip{flex:none;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:9px 12px;min-width:80px}
.cat-date{font-size:10px;color:var(--muted);font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin-bottom:3px}
.cat-name{font-size:12.5px;font-weight:600;margin-bottom:2px}
.cat-days{font-size:11px;color:var(--faint)}
/* tooltip on kd-tile */
.kd-tooltip{display:none;position:absolute;z-index:99;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-size:12px;line-height:1.5;color:var(--text);width:200px;pointer-events:none;top:calc(100% + 6px);left:50%;transform:translateX(-50%)}
.kd-tile{position:relative}
.kd-tile:hover .kd-tooltip{display:block}
.sub{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px 14px}
.sub .k{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:600}
.sub .v{font-family:var(--mono);font-size:26px;font-weight:600;margin-top:6px;font-variant-numeric:tabular-nums}
.sub .l{font-size:11.5px;margin-top:2px}
.summary{font-size:14.5px;line-height:1.55}
.watch div{padding:8px 0;border-top:1px solid var(--border);font-size:13.5px;line-height:1.45}
.watch div:first-child{border-top:none}
.watch .arr{color:var(--info);margin-right:6px}
.conf{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface2);border-radius:10px;border:1px solid var(--border);margin-bottom:12px}
.conf-bar{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.conf-fill{height:100%;border-radius:3px}
.conf-label{font-family:var(--mono);font-size:12px;white-space:nowrap}
.contrib{margin-top:10px}
.contrib-row{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:13px}
.contrib-name{color:var(--muted);width:120px;flex:none;font-size:12px}
.contrib-bar{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.contrib-fill{height:100%;border-radius:3px}
.contrib-val{font-family:var(--mono);font-size:12px;width:36px;text-align:right;flex:none}
.alert{display:flex;gap:10px;align-items:flex-start;padding:10px 0;border-top:1px solid var(--border)}
.alert:first-of-type{border-top:none;padding-top:2px}
.adot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex:none}
.pri{font-family:var(--mono);font-size:10px;font-weight:600;padding:2px 6px;border-radius:5px;margin-left:auto;flex:none}
.pri.HIGH{color:var(--high);background:rgba(248,81,73,.12)}
.pri.MED{color:var(--moderate);background:rgba(216,166,87,.12)}
.empty{color:var(--muted);font-size:13px}
/* metric rows */
.metric{border-top:1px solid var(--border);padding:12px 0}
.metric:first-child{border-top:none}
.mhead{display:flex;align-items:center;gap:6px}
.mname{font-size:14px;font-weight:600;margin-right:2px}
.info{appearance:none;border:1px solid var(--border);background:transparent;color:var(--muted);width:20px;height:20px;border-radius:50%;font-size:11px;font-weight:700;cursor:pointer;flex:none;line-height:1;font-style:italic;padding:0}
.info:hover,.info:focus-visible{border-color:var(--info);color:var(--info);outline:none}
.badge{font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:.04em;padding:2px 5px;border-radius:4px;text-transform:uppercase}
.b-proxy{color:var(--info);background:rgba(88,166,255,.12)}
.b-manual{color:var(--moderate);background:rgba(216,166,87,.12)}
.b-unavailable{color:var(--faint);background:rgba(110,118,129,.1)}
.b-stale{color:var(--high);background:rgba(248,81,73,.12)}
.mval{font-family:var(--mono);font-size:15px;font-variant-numeric:tabular-nums;margin-left:auto;white-space:nowrap;display:flex;align-items:center;gap:5px}
.marrow{font-size:13px}
.mbody{margin-top:9px;font-size:13px;line-height:1.5;color:var(--muted);display:none;padding-left:2px}
.mbody.open{display:block}
.mbody .primer{color:var(--faint)}
.mbody .reading{color:var(--text);margin-top:6px}
/* sectors */
.phase{font-family:var(--mono);font-size:16px;font-weight:600}
.phase-sub{font-size:11.5px;color:var(--muted);margin-top:2px}
.favored{display:flex;gap:6px;flex-wrap:wrap;margin:12px 0 14px}
.chip{font-family:var(--mono);font-size:11px;font-weight:600;padding:4px 8px;border-radius:7px;background:rgba(63,185,80,.1);color:var(--low);border:1px solid rgba(63,185,80,.25)}
.srow{display:grid;grid-template-columns:34px 1fr 52px;align-items:center;gap:10px;padding:5px 0}
.stk{font-family:var(--mono);font-size:12px;color:var(--muted)}
.sbar{position:relative;height:6px;background:var(--surface2);border-radius:4px}
.sbar i{position:absolute;top:0;bottom:0;border-radius:4px}
.sbar .mid{position:absolute;left:50%;top:-2px;bottom:-2px;width:1px;background:var(--border)}
.sval{font-family:var(--mono);font-size:12px;text-align:right;font-variant-numeric:tabular-nums}
.spark{opacity:.6;flex:none}
.srow.lead .stk,.srow.lag .stk{color:var(--text);font-weight:600}
.srow.mute{opacity:.4}
.stag{font-size:9px;font-weight:700;letter-spacing:.04em;padding:1px 4px;border-radius:4px;margin-left:6px}
/* catalysts */
.cat{display:flex;align-items:center;gap:12px;padding:9px 0;border-top:1px solid var(--border)}
.cat:first-of-type{border-top:none;padding-top:2px}
.cat .cd{font-family:var(--mono);font-size:12px;color:var(--muted);width:48px;flex:none}
.cat .cw{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--faint)}
.banner{display:flex;gap:10px;align-items:flex-start;background:rgba(216,166,87,.08);border:1px solid rgba(216,166,87,.25);border-radius:12px;padding:11px 13px;margin-bottom:14px}
.banner svg{width:16px;height:16px;flex:none;margin-top:1px;color:var(--moderate)}
.banner .bt{font-size:12.5px;line-height:1.45}
footer{margin-top:18px;padding:0 2px;color:var(--faint);font-size:11px;line-height:1.6}
.legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:8px}
.legend span{display:inline-flex;align-items:center;gap:5px}
.legend i{width:8px;height:8px;border-radius:2px;display:inline-block}
.lk{color:var(--faint);text-decoration:underline;cursor:pointer;background:none;border:none;font:inherit;padding:0}
#toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);opacity:0;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:11px 16px;border-radius:10px;font-size:13px;max-width:90vw;text-align:center;pointer-events:none;transition:opacity .25s,transform .25s;z-index:50}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.skeleton{color:var(--faint);text-align:center;padding:40px 0;font-size:14px}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <div class="brand">Market Health</div>
      <h1 class="title">Risk Dashboard</h1>
      <div class="updated" id="updated">Loading&hellip;</div>
    </div>
    <button class="refresh" id="refreshBtn">
      <svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 3a5 5 0 1 0 4.546 2.914.75.75 0 0 1 1.364-.626A6.5 6.5 0 1 1 8 1.5V0l3 2.5L8 5V3Z"/></svg>
      Refresh
    </button>
  </header>
  <div class="tabs" id="tabs" role="tablist"></div>
  <div id="content"><div class="skeleton">Loading market data&hellip;</div></div>
  <footer>
    <div class="legend">
      <span><i style="background:var(--info)"></i>proxy</span>
      <span><i style="background:var(--moderate)"></i>manual</span>
      <span><i style="background:var(--faint)"></i>unavailable</span>
      <span><i style="background:var(--high)"></i>stale</span>
    </div>
    <div id="health"></div>
    <div style="margin-top:8px">Data via FRED, yfinance, Shiller/multpl, Alpaca (S&amp;P 500 internals), Google Trends. Breadth signals are S&amp;P 500 proxies for NYSE-wide indicators. Not investment advice.</div>
    <div style="margin-top:8px"><button class="lk" id="resetToken">Reset refresh token</button></div>
  </footer>
</div>
<div id="toast"></div>
<script>
"use strict";
const REPO="robertsvecchio/market-health-dashboard";
const WORKFLOW="update_dashboard.yml";
const DATA_URL="./data/latest.json";

/* ── static primers ── */
const PRIMERS={
  // ---- Valuation ----
  cape:"CAPE = price ÷ 10yr avg real earnings. Long-run avg ~17; above 30 has always preceded a bear eventually. NOT a timing tool — can stay elevated for years. Predicts 10-yr forward returns, not next quarter.",
  buffett_indicator:"US stock market cap ÷ GDP. Above +1 std dev from trend = expensive. Watch the deviation (z-score), not the raw level.",
  excess_cape_yield:"CAPE earnings yield minus real bond yield. Negative = bonds beat stocks on a risk-adjusted basis. Lowest since the dot-com peak.",
  forward_pe:"Price ÷ next-12-month earnings. Long-run mean ~16x. Above 22x = elevated drawdown risk historically. More timely than CAPE but subject to analyst optimism bias.",
  ad_line_proxy:"Equal-weight vs cap-weight S&P. When RSP lags SPY, megacaps are masking weak breadth — a divergence that often precedes turns.",
  // ---- Cycle ----
  goldman_composite:"5-input percentile composite: valuation, yield curve, unemployment, inflation, LEI. Above 70 = high-risk historically. Summary gauge, not a timing trigger.",
  lei:"OECD leading indicator for the US. Direction beats level: rising = expansion, falling = softening ahead.",
  lending_standards:"Net % of banks tightening C&I lending — measures credit AVAILABILITY (vs HY spreads = credit price). Above +30% has preceded every US recession since 1990 by 2–4 quarters. Quarterly, lags ~1 month. (FRED DRTSCILM)",
  yield_curve_10y3m:"10yr minus 3mo yield. HIT RATE: inversion preceded all 7 post-WWII recessions, median lead 15 months (range 6–24). One false positive (1998). Most reliable lead signal — but a calendar warning, not a trade trigger.",
  unemployment:"Very low = late-cycle. The danger is the TURN: +0.5pt from 12-mo low triggers the Sahm Rule, which has called every recession onset since 1950.",
  fed_funds:"Fed policy rate. Rate-cut cycles often precede recessions — the Fed cuts because something is breaking, not as a gift to bulls.",
  ppi:"Producer prices (final demand). Leads CPI by 1–3 months — watch for a PPI turn to front-run the inflation narrative shift. (FRED PPIFIS)",
  core_cpi:"Core consumer inflation ex food/energy. Persistent above 3% keeps the Fed tight, which pressures multiples.",
  core_pce:"Fed's preferred inflation gauge. Direction vs 2% drives policy more than any other single number.",
  nfci_leverage:"Chicago Fed financial leverage. Positive = tighter/more leveraged than avg. Buildup raises fragility.",
  hy_oas:"Extra yield for holding junk bonds over Treasuries. Widening = credit stress. Bond market sniffs trouble before equities — watch for spread divergence from equity calm.",
  ig_oas:"IG credit spread. Calmer than HY but widening alongside HY = broad credit tightening.",
  umich_sentiment:"Consumer mood. Sharp drops signal spending pullbacks. Extreme lows (~50s) have historically been contrarian buy signals, not crash confirmations.",
  cc_delinquency:"Credit card past-due rate. Leads the economy — consumer stress shows up here months before GDP.",
  auto_delinquency:"Auto loan delinquencies. Cracks before mortgages; early consumer stress signal.",
  savings_rate:"Personal savings ÷ income. Below 3% + rising delinquencies = spending increasingly debt-funded. Fragile.",
  debt_service:"Household debt payments ÷ disposable income. High = less cushion for shocks.",
  // ---- Trend & Breadth ----
  spx_vs_200dma:"S&P 500 vs its 200-day average. Breaks below a flat or falling 200-DMA preceded every bear since 2000.",
  dma200_slope:"Direction of the 200-DMA. Rising = dips buyable. Flat/falling = breaks become structural.",
  weekly_macd:"Weekly trend-momentum. Daily MACD is noise; weekly turning negative preceded every sustained bear since 2000.",
  pct_above_200dma:"% of S&P 500 above their 200-DMA. Above 60% = healthy. Below 40% while index near highs = distribution. Coincident, not leading.",
  mcclellan:"Advances minus declines momentum oscillator. Negative = deteriorating internals. (S&P 500 proxy; needs ~40 days to stabilize.)",
  zweig_adv_ratio:"HIT RATE: Zweig Breadth Thrust has fired ~19 times since WWII — S&P 500 higher 6 AND 12 months later every single time, avg +23% at 12mo. Rare (fires at bottoms), but the most reliable bullish signal in the set. (S&P 500 proxy.)",
  hindenburg_omen_confirmed:"HIT RATE: ~25% preceded a 5%+ decline; ~10% preceded 15%+. 75–80% false alarms. Caught 1987, 2000, 2008 tops. High noise, useful only as cluster confirmation (2+/30d), never standalone. (S&P 500 proxy.)",
  hindenburg_omen_today:"RAW flag — fires when new highs AND lows both exceed 2.2%, index in uptrend, McClellan negative. Not actionable alone.",
  titanic_syndrome_confirmed:"No robust published hit-rate study. Weight as corroboration of Hindenburg only. (S&P 500 proxy.)",
  titanic_syndrome_today:"RAW flag — fires when new lows outnumber new highs. Not actionable alone.",
  ad_line_proxy:"Equal-weight vs cap-weight S&P 500. RSP lagging SPY = megacap masking = breadth warning.",
  // ---- Sentiment ----
  fear_greed:"CNN's official Fear & Greed Index, scraped directly from CNN's API. 0=Extreme Fear, 100=Extreme Greed. 7 equally-weighted inputs: momentum, price strength, breadth, put/call, volatility, HY demand, safe haven. Best used as a CONTRARIAN signal — extremes (<25 or >75) mark emotional turning points. Falls back to z-score approximation if CNN is unreachable.",
  sahm_rule:"HIT RATE: triggered in every US recession since 1950, avg ~3 months in — well before NBER declares. Two false positives: 1959 (followed by recession 6mo later) and 2024 (post-pandemic labor supply surge). NOT a predictor — a recession-onset confirmation. Currently 0.23pp; trigger = 0.50pp. (FRED SAHMREALTIME)",
  recession_prob:"Chauvet-Piger smoothed recession probability from a Markov-switching model applied to 4 coincident variables: payrolls, industrial production, real personal income, and real trade sales. Above 20% has coincided with every post-WWII recession. (FRED RECPROUSM156N)",
  philly_coincident:"Philly Fed State Coincident Index (SCI) — national composite summarizing current economic activity across 4 factors: nonfarm payrolls, unemployment, manufacturing hours, wages. Direction matters: rising = expanding, falling = contracting. The 50-state diffusion version (% of states declining) has preceded every US recession since 1980 with very few false positives. (FRED USPHCI)",
  vix:"Expected 30-day S&P volatility. Concurrent, not leading — spikes with selloffs. Above 40 = capitulation zone (contrarian buy). Below 15 = complacency zone (contrarian warning).",
  put_call:"Puts ÷ calls volume. High = fear (contrarian buy signal). Low = euphoria (contrarian sell signal). Currently unavailable — CBOE endpoint down.",
  // ---- Sectors ----
  cycle_phase:"Business-cycle phase from LEI + yield curve. Early cycle: financials/discretionary. Mid: tech/industrials. Late: energy/materials. Contraction: defensives. Defensives leading = late-cycle tell.",
};

/* ── investor-risk color scale: each metric maps value → risk level → color ── */
function metricRiskColor(key,value,m){
  if(value==null)return null;
  const v=parseFloat(value);
  // Returns a CSS color string based on investor risk (not economic health).
  switch(key){
    // Higher = more risky
    case"cape":return v>30?"var(--high)":v>22?"var(--elevated)":v>17?"var(--moderate)":"var(--low)";
    case"buffett_indicator":{const z=m&&m.deviation_z!=null?m.deviation_z:0;return z>2?"var(--high)":z>1?"var(--elevated)":z>0?"var(--moderate)":"var(--low)";}
    case"forward_pe":return v>22?"var(--high)":v>19?"var(--elevated)":v>16?"var(--moderate)":"var(--low)";
    case"hy_oas":return v>7?"var(--high)":v>5?"var(--elevated)":v>3.5?"var(--moderate)":"var(--low)";
    case"ig_oas":return v>1.5?"var(--high)":v>1?"var(--elevated)":v>0.6?"var(--moderate)":"var(--low)";
    case"vix":return v>40?"var(--high)":v>30?"var(--elevated)":v>20?"var(--moderate)":"var(--low)";
    case"nfci_leverage":return v>0.5?"var(--high)":v>0?"var(--elevated)":v>-0.5?"var(--moderate)":"var(--low)";
    case"cc_delinquency":return v>3.5?"var(--high)":v>2.5?"var(--elevated)":v>1.5?"var(--moderate)":"var(--low)";
    case"auto_delinquency":return v>2.5?"var(--high)":v>1.5?"var(--elevated)":v>1?"var(--moderate)":"var(--low)";
    case"debt_service":return v>14?"var(--high)":v>12?"var(--elevated)":v>10?"var(--moderate)":"var(--low)";
    case"goldman_composite":return v>70?"var(--high)":v>50?"var(--elevated)":v>30?"var(--moderate)":"var(--low)";
    // Higher = less risky (inverted)
    case"excess_cape_yield":return v<0?"var(--high)":v<1?"var(--elevated)":v<2?"var(--moderate)":"var(--low)";
    case"yield_curve_10y3m":return v<0?"var(--high)":v<0.5?"var(--elevated)":v<1.5?"var(--moderate)":"var(--low)";
    case"lei":return null; // direction matters, not level — handled by arrow
    case"savings_rate":return v<3?"var(--high)":v<5?"var(--elevated)":v<8?"var(--moderate)":"var(--low)";
    case"umich_sentiment":return v<60?"var(--high)":v<75?"var(--elevated)":v<90?"var(--moderate)":"var(--low)";
    case"pct_above_200dma":return v<40?"var(--high)":v<50?"var(--elevated)":v<60?"var(--moderate)":"var(--low)";
    // Inflation: close to 2% is green, far in either direction is risky
    case"core_pce":case"core_cpi":{const yoy=m&&m.yoy_pct!=null?m.yoy_pct:v;return yoy>4?"var(--high)":yoy>2.5?"var(--elevated)":yoy>1.5?"var(--moderate)":"var(--low)";}
    // Fed funds: cuts = easing (late cycle signal), hikes = tightening
    case"fed_funds":return v>5?"var(--elevated)":v>3?"var(--moderate)":"var(--low)";
    // Unemployment: low but rising = risky
    case"unemployment":{const tr=m&&m.trend&&m.trend.direction;return(v<4.5&&tr==="rising")?"var(--elevated)":v>5.5?"var(--elevated)":v>4.5?"var(--moderate)":"var(--low)";}
    // Trend
    case"spx_vs_200dma":return v<-5?"var(--high)":v<0?"var(--elevated)":v>5?"var(--low)":"var(--moderate)";
    case"weekly_macd":return(m&&m.bearish)?"var(--elevated)":"var(--low)";
    default:return null;
  }
}

/* Arrow color: green = moving toward safety, red = moving toward risk */
function arrowColor(key,direction){
  if(!direction||direction==="flat")return"var(--faint)";
  // Keys where rising = more risky
  const risingIsBad=["cape","hy_oas","ig_oas","vix","cc_delinquency","auto_delinquency",
    "debt_service","nfci_leverage","unemployment","forward_pe","core_pce","core_cpi","fed_funds"];
  // Keys where rising = less risky
  const risingIsGood=["lei","yield_curve_10y3m","savings_rate","umich_sentiment",
    "pct_above_200dma","excess_cape_yield","spx_vs_200dma"];
  if(risingIsBad.includes(key))return direction==="rising"?"var(--high)":"var(--low)";
  if(risingIsGood.includes(key))return direction==="rising"?"var(--low)":"var(--high)";
  return"var(--faint)";
}

function riskColor(v){if(v==null)return"var(--faint)";if(v<=25)return"var(--low)";if(v<=50)return"var(--moderate)";if(v<=75)return"var(--elevated)";return"var(--high)";}
function num(x,dp){return(x==null||isNaN(x))?"—":Number(x).toFixed(dp==null?2:dp);}
function esc(s){return String(s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}
function el(h){const t=document.createElement("template");t.innerHTML=h.trim();return t.content.firstElementChild;}
function daysBetween(a,b){const x=new Date(a),y=new Date(b);if(isNaN(x)||isNaN(y))return null;return Math.round((y-x)/86400000);}

function arrowChar(m){
  const d=m&&m.trend&&m.trend.direction;
  return d==="rising"?"↑":d==="falling"?"↓":d==="flat"?"→":"";
}

function badge(status,stale){
  if(stale)return`<span class="badge b-stale">stale</span>`;
  if(!status||status==="ok")return"";
  return`<span class="badge b-${status}">${status}</span>`;
}

function confidenceScore(h){
  let c=100;
  c-=(h.unavailable||0)*8;
  c-=(h.proxy||0)*4;
  c-=(h.manual||0)*3;
  c=Math.max(0,Math.min(100,c));
  return c;
}

let DATA=null;

/* ── metric row ── */
function metric(section,key,label,fmt,readingKey,staleDays){
  const m=(DATA[section]||{})[key];
  const rk=readingKey||key;
  const reading=((DATA.interpretation||{}).readings||{})[rk];
  const primer=PRIMERS[rk];
  const hasBody=!!(primer||reading);
  let valHtml,stale=false,status,valColor=null;

  if(!m||m.status==="unavailable"||m.value==null){
    valHtml=`<span style="color:var(--faint)">—${badge("unavailable",false)}</span>`;
  }else{
    status=m.status;
    if(m.asof){const dd=daysBetween(m.asof,(DATA.meta||{}).generated_utc||new Date().toISOString());stale=dd!=null&&dd>(staleDays||45);}
    valColor=metricRiskColor(rk,m.value,m);
    const aChar=arrowChar(m);
    const aColor=aChar?arrowColor(rk,m.trend&&m.trend.direction):"";
    valHtml=`<span style="${valColor?`color:${valColor}`:""}">${fmt?fmt(m.value,m):esc(m.value)}</span>${aChar?`<span class="marrow" style="color:${aColor}">${aChar}</span>`:""}`;
  }

  const _sf=HIST_FIELD[rk]||HIST_FIELD[key];
  if(_sf&&m&&m.value!=null){const _sp=sparkline(_sf);if(_sp)valHtml=_sp+valHtml;}
  const bdg=badge(status,stale);
  // Order: name | ⓘ | badge | value+arrow
  const card=el(`<div class="metric">
    <div class="mhead">
      <span class="mname">${esc(label)}</span>
      ${hasBody?`<button class="info" aria-label="Explain ${esc(label)}" aria-expanded="false">i</button>`:""}
      ${bdg?`<span style="margin-left:2px">${bdg}</span>`:""}
      <span class="mval">${valHtml}</span>
    </div>
    ${hasBody?`<div class="mbody" role="region">
      ${primer?`<div class="primer">${esc(primer)}</div>`:""}
      ${reading?`<div class="reading"><b>Today:</b> ${esc(reading)}</div>`:""}
    </div>`:""}
  </div>`);

  if(hasBody){
    const btn=card.querySelector(".info"),body=card.querySelector(".mbody");
    btn.addEventListener("click",()=>{
      const open=body.classList.toggle("open");
      btn.setAttribute("aria-expanded",open);
    });
  }
  return card;
}

const HIST_FIELD={fear_greed:"composite",composite:"composite",structural_score:"structural",cycle_score:"cycle",
  goldman_composite:"goldman",cape:"cape",buffett_indicator:"buffett_z",
  yield_curve_10y3m:"yield_curve",hy_oas:"hy_oas",vix:"vix",pct_above_200dma:"pct_above_200"};
function sparkSeries(field){
  const hist=DATA.history||[];const out=[];
  for(const h of hist){const v=h[field];if(v!=null&&!isNaN(v))out.push(+v);}
  return out;
}
function sparkline(field){
  const v=sparkSeries(field);
  if(v.length<4)return "";
  const w=58,h=16,p=2,n=v.length,mn=Math.min(...v),mx=Math.max(...v),rg=(mx-mn)||1;
  let pts="";for(let i=0;i<n;i++){const x=p+(i/(n-1))*(w-2*p);const y=p+(1-(v[i]-mn)/rg)*(h-2*p);pts+=(i?" ":"")+x.toFixed(1)+","+y.toFixed(1);}
  const lx=(w-p).toFixed(1),ly=(p+(1-(v[n-1]-mn)/rg)*(h-2*p)).toFixed(1);
  return `<svg class="spark" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" aria-hidden="true"><polyline points="${pts}" fill="none" stroke="var(--muted)" stroke-width="1.2"/><circle cx="${lx}" cy="${ly}" r="1.5" fill="var(--text)"/></svg>`;
}
function compositeStrip(){
  const v=sparkSeries("composite");
  if(v.length<4)return null;
  const n=v.length,w=320,h=42,p=3,mn=Math.min(...v),mx=Math.max(...v),rg=(mx-mn)||1;
  let line="";for(let i=0;i<n;i++){const x=p+(i/(n-1))*(w-2*p);const y=p+(1-(v[i]-mn)/rg)*(h-2*p);line+=(i?" ":"")+x.toFixed(1)+","+y.toFixed(1);}
  const last=v[n-1],first=v[0],col=riskColor(last);
  const dir=last>first+1?"rising":last<first-1?"falling":"flat";
  return el(`<div class="card"><h2>Composite Risk — last ${n} readings</h2>
    <svg width="100%" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" style="display:block"><polyline points="${line}" fill="none" stroke="${col}" stroke-width="1.8"/></svg>
    <div class="phase-sub" style="margin-top:6px">Range ${num(mn,0)}–${num(mx,0)} · now <b style="color:${col}">${num(last,0)}</b> · trend ${dir}</div>
  </div>`);
}
function mList(specs){
  const c=el(`<div class="card"></div>`);
  specs.forEach(s=>{
    if(s.h){c.appendChild(el(`<h2 style="margin-top:${s.first?"0":"10px"}">${s.h}</h2>`));return;}
    c.appendChild(metric(s.sec,s.key,s.label,s.fmt,s.rk,s.stale));
  });
  return c;
}

/* ── confidence card ── */
function confCard(){
  const h=DATA.source_health||{};
  const score=confidenceScore(h);
  const lbl=score>=85?"Strong":score>=65?"Medium":score>=40?"Weak":"Limited";
  const col=score>=85?"var(--low)":score>=65?"var(--moderate)":score>=40?"var(--elevated)":"var(--high)";
  const issues=[];
  if(h.unavailable)issues.push(`${h.unavailable} unavailable`);
  if(h.proxy)issues.push(`${h.proxy} proxy`);
  if(h.manual)issues.push(`${h.manual} manual`);
  const c=el(`<div class="card"><h2>Model Confidence</h2></div>`);
  c.appendChild(el(`<div class="conf">
    <span class="conf-label" style="color:${col}">${lbl} ${score}%</span>
    <div class="conf-bar"><div class="conf-fill" style="width:${score}%;background:${col}"></div></div>
    <span class="conf-label" style="color:var(--faint)">${issues.join(" · ")||"All sources live"}</span>
  </div>`));
  return c;
}

/* ── score contribution waterfall ── */
function contribCard(){
  const comp=(DATA.scores||{}).composite||{};
  const si=comp.structural_inputs||{};
  const ci=comp.cycle_inputs||{};
  const all={...si,...ci};
  const keys=Object.keys(all).filter(k=>all[k]!=null);
  if(!keys.length)return null;
  const max=Math.max(...keys.map(k=>all[k]),1);
  const labels={cape:"CAPE",buffett:"Buffett",ecy:"Excess CAPE Yield",breadth:"Breadth",
    goldman:"Goldman composite",nfci_leverage:"NFCI Leverage",debt_service:"Debt Service"};
  const c=el(`<div class="card"><h2>Score Contributors</h2><div class="contrib"></div></div>`);
  const box=c.querySelector(".contrib");
  keys.sort((a,b)=>all[b]-all[a]).forEach(k=>{
    const v=all[k];const w=v/max*100;
    const col=v>70?"var(--high)":v>50?"var(--elevated)":v>30?"var(--moderate)":"var(--low)";
    box.appendChild(el(`<div class="contrib-row">
      <span class="contrib-name">${esc(labels[k]||k)}</span>
      <div class="contrib-bar"><div class="contrib-fill" style="width:${w}%;background:${col}"></div></div>
      <span class="contrib-val" style="color:${col}">${num(v,0)}</span>
    </div>`));
  });
  return c;
}

/* ── alerts from interpretation (single source of truth) ── */
function deriveAlerts(d){
  const out=[];
  const m=d.macro||{},s=d.scores||{},se=d.sentiment||{},b=d.breadth||{},st=d.structural||{};
  const yc=m.yield_curve_10y3m;
  if(yc&&yc.value!=null){
    if(yc.value<0)out.push({txt:"Yield curve inverted (10y–3m below zero)",pri:"HIGH"});
    else if(yc.value<0.5)out.push({txt:`Yield curve flat (${num(yc.value,2)})`,pri:"MED"});
  }
  const hy=m.hy_oas;
  if(hy&&hy.value!=null&&hy.value>=5)out.push({txt:`Credit spreads widening (HY OAS ${num(hy.value,2)}%)`,pri:hy.value>=7?"HIGH":"MED"});
  const g=s.goldman_composite;
  if(g&&g.value!=null){
    if(g.above_70||g.value>70)out.push({txt:`Goldman composite above 70 (${num(g.value,0)})`,pri:"HIGH"});
    else if(g.above_50||g.value>50)out.push({txt:`Goldman composite above 50 (${num(g.value,0)})`,pri:"MED"});
  }
  const vix=se.vix;
  if(vix&&vix.value!=null){
    if(vix.above_40||vix.value>40)out.push({txt:`VIX above 40 (${num(vix.value,1)})`,pri:"HIGH"});
    else if(vix.above_30||vix.value>30)out.push({txt:`VIX above 30 (${num(vix.value,1)})`,pri:"MED"});
  }
  const pa=b.pct_above_200dma;
  if(pa&&pa.below_40)out.push({txt:`Only ${num(pa.value,0)}% of S&P 500 above 200-DMA`,pri:"HIGH"});
  if(b.hindenburg_omen_confirmed&&b.hindenburg_omen_confirmed.value)out.push({txt:"Hindenburg Omen CONFIRMED (cluster 2+/30d — S&P 500 proxy)",pri:"HIGH"});
  else if(b.hindenburg_omen_today&&b.hindenburg_omen_today.value)out.push({txt:"Hindenburg Omen raw flag today (not yet confirmed)",pri:"LOW"});
  if(b.titanic_syndrome_confirmed&&b.titanic_syndrome_confirmed.value)out.push({txt:"Titanic Syndrome CONFIRMED (cluster — S&P 500 proxy)",pri:"HIGH"});
  else if(b.titanic_syndrome_today&&b.titanic_syndrome_today.value)out.push({txt:"Titanic Syndrome raw flag today (not yet confirmed)",pri:"LOW"});
  if(st.excess_cape_yield&&(st.excess_cape_yield.low||st.excess_cape_yield.value<1))
    out.push({txt:"Excess CAPE Yield low — stocks expensive vs bonds",pri:"MED"});
  if(st.ad_line_proxy&&st.ad_line_proxy.bearish_divergence)
    out.push({txt:"Breadth divergence — equal-weight lagging cap-weight",pri:"MED"});
  const un=m.unemployment;
  if(un&&un.value!=null&&un.trend&&un.trend.direction==="rising"&&un.value<5)
    out.push({txt:`Unemployment rising (${num(un.value,1)}%) — late-cycle signal`,pri:"MED"});
  const cc=m.cc_delinquency;
  if(cc&&cc.value!=null&&cc.trend&&cc.trend.direction==="rising"&&cc.value>2.5)
    out.push({txt:`Credit-card delinquencies rising (${num(cc.value,2)}%)`,pri:"MED"});
  const ord={HIGH:0,MED:1};
  out.sort((a,b)=>ord[a.pri]-ord[b.pri]);
  return out;
}

    {name:"Economy",   val:null, score:(S.cycle_score||{}).value,

function odometer(score,label,col){
  // W=130, H=74, cx=65, cy=54, r=44, sw=10
  // Arc runs left(180deg)->right(0deg) = semicircle flat at bottom
  // Arc endpoints at y=cy=54 (sin180=sin0=0)
  // Arc top at y=cy-r=10 (good clearance)
  // Score at cy-10=44 (inside arc), label at cy+12=66, Fear/Greed at cy+4=58
  // All inside H=74
  const v=score==null?50:Math.max(0,Math.min(100,score));
  const W=130,H=74,r=44,cx=65,cy=54,sw=10;
  const toRad=a=>a*Math.PI/180;
  const arcPath=(pct,clr)=>{
    const a1=toRad(180),a2=toRad(180-pct/100*180);
    const x1=cx+r*Math.cos(a1),y1=cy+r*Math.sin(a1);
    const x2=cx+r*Math.cos(a2),y2=cy+r*Math.sin(a2);
    return `<path d="M${x1.toFixed(1)},${y1.toFixed(1)} A${r},${r} 0 ${pct>50?1:0},1 ${x2.toFixed(1)},${y2.toFixed(1)}" fill="none" stroke="${clr}" stroke-width="${sw}" stroke-linecap="round"/>`;
  };
  const ndeg=toRad(180-v/100*180);
  const nl=32,nx=(cx+nl*Math.cos(ndeg)).toFixed(1),ny=(cy+nl*Math.sin(ndeg)).toFixed(1);
  const lx=(cx-r+2).toFixed(1),rx=(cx+r-2).toFixed(1);
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;max-width:${W}px;height:${H}px;display:block;margin:0 auto">
    ${arcPath(100,"rgba(255,255,255,.09)")}
    ${arcPath(v,col)}
    <line x1="${cx}" y1="${cy}" x2="${nx}" y2="${ny}" stroke="rgba(255,255,255,.85)" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="${cx}" cy="${cy}" r="3" fill="rgba(255,255,255,.85)"/>
    <text x="${cx}" y="${cy-10}" text-anchor="middle" font-family="ui-monospace,monospace" font-size="22" font-weight="700" fill="${col}">${score==null?"—":Math.round(score)}</text>
    <text x="${cx}" y="${cy+12}" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="#8B949E">${esc(label||"")}</text>
    <text x="${lx}" y="${cy+4}" text-anchor="start" font-family="-apple-system,sans-serif" font-size="8" fill="#555E6B">Fear</text>
    <text x="${rx}" y="${cy+4}" text-anchor="end" font-family="-apple-system,sans-serif" font-size="8" fill="#555E6B">Greed</text>
  </svg>`;
}

  const umlbl=umv==null?"—":umv<60?"Pessimistic":umv<75?"Cautious":umv<90?"Moderate":"Confident";
  const hist=DATA.history||[];
  const compHist=hist.map(h=>h.composite).filter(v=>v!=null);
  const trendTag=compHist.length>=7?(()=>{
    const recent=compHist.slice(-7),old7=compHist.slice(-30,-23);
    const rAvg=recent.reduce((a,b)=>a+b,0)/recent.length;
    const oAvg=old7.length?old7.reduce((a,b)=>a+b,0)/old7.length:rAvg;
    const diff=rAvg-oAvg;
    return diff>2?"↑ Rising":diff<-2?"↓ Falling":"→ Stable";
  })():"";

  // sparkline helper for top tiles
  const tileSparkSvg=(vals,col)=>{
    if(!vals||vals.length<4)return "";
    const n=vals.length,mn=Math.min(...vals),mx=Math.max(...vals),rg=(mx-mn)||1;
    const W=60,H=20,p=2;
    let pts="";for(let i=0;i<n;i++){const x=p+(i/(n-1))*(W-2*p);const y=p+(1-(vals[i]-mn)/rg)*(H-2*p);pts+=(i?" ":"")+x.toFixed(1)+","+y.toFixed(1);}
    const lx=(W-p).toFixed(1),ly=(p+(1-(vals[n-1]-mn)/rg)*(H-2*p)).toFixed(1);
    return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="display:block;margin-top:6px"><polyline points="${pts}" fill="none" stroke="${col}" stroke-width="1.5" opacity="0.7"/><circle cx="${lx}" cy="${ly}" r="2" fill="${col}"/></svg>`;
  };

  const compSpark=tileSparkSvg(compHist.slice(-20),riskColor(cv));
  let fgHist=hist.map(h=>h.fear_greed).filter(v=>v!=null);
  if(fgHist.length<4 && fg.spark && fg.spark.length>=4) fgHist=fg.spark;  // CNN embedded history
  const fgSpark=tileSparkSvg(fgHist.slice(-20),fgcol);
  const vxHist=hist.map(h=>h.vix).filter(v=>v!=null);
  const vxSpark=tileSparkSvg(vxHist.slice(-20),vxcol);
  let umHist=hist.map(h=>h.umich).filter(v=>v!=null);
  if(umHist.length<4 && um.spark && um.spark.length>=4) umHist=um.spark;  // FRED embedded history
  const umSpark=tileSparkSvg(umHist.slice(-20),umcol);

  const heroRow=el(`<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px"></div>`);

  // Tile 1: Market Health score
  // helper: wire an info button + mbody primer onto a tile element
  function wireTileInfo(tile, primerKey){
    const primerText=PRIMERS[primerKey]||"";
    if(!primerText)return;
    const btn=tile.querySelector(".tile-info-btn");
    const body=tile.querySelector(".tile-mbody");
    if(!btn||!body)return;
    btn.addEventListener("click",e=>{
      e.stopPropagation();
      const o=body.classList.toggle("open");
      btn.setAttribute("aria-expanded",o);
    });
  }

  // Tile 1: Market Health
  const t1=el(`<div class="ov-score-card"></div>`);
  t1.innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
      <div class="ov-score-label" style="margin-bottom:0">Market Health</div>
      <button class="info tile-info-btn" aria-label="Explain Market Health" aria-expanded="false">i</button>
    </div>
    <div class="ov-big-num" style="color:${riskColor(cv)};font-size:42px">${cv==null?"—":Math.round(cv)}</div>
    <div class="ov-risk-label" style="color:${riskColor(cv)};font-size:13px">${esc(comp.label||"Unknown")}</div>
    ${compSpark}
    <div class="mbody tile-mbody"><div class="primer">${esc(PRIMERS.goldman_composite||"Composite risk score 0-100. Higher = more risk.")}</div></div>`;
  wireTileInfo(t1,"goldman_composite");
  heroRow.appendChild(t1);

  // Tile 2: Fear & Greed — big-number format matching the other tiles
  const t2=el(`<div class="ov-score-card"></div>`);
  t2.innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
      <div class="ov-score-label" style="margin-bottom:0">Fear &amp; Greed</div>
      <button class="info tile-info-btn" aria-label="Explain Fear and Greed" aria-expanded="false">i</button>
    </div>
    <div class="ov-big-num" style="color:${fgcol};font-size:42px">${fgv==null?"—":Math.round(fgv)}</div>
    <div class="ov-risk-label" style="color:${fgcol};font-size:13px">${esc(fgLabel)}</div>
    <div style="font-size:10px;color:var(--muted);margin-top:4px">CNN Index / 100</div>
    ${fgSpark}
    <div class="mbody tile-mbody"><div class="primer">${esc(PRIMERS.fear_greed||"CNN Fear & Greed Index. 0=Extreme Fear, 100=Extreme Greed.")}</div></div>`;
  wireTileInfo(t2,"fear_greed");
  heroRow.appendChild(t2);

  // Tile 3: VIX
  const t3=el(`<div class="ov-score-card"></div>`);
  t3.innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
      <div class="ov-score-label" style="margin-bottom:0">VIX</div>
      <button class="info tile-info-btn" aria-label="Explain VIX" aria-expanded="false">i</button>
    </div>
    <div class="ov-big-num" style="color:${vxcol};font-size:42px">${vxv==null?"—":num(vxv,1)}</div>
    <div class="ov-risk-label" style="color:${vxcol};font-size:13px">${esc(vxlbl)}</div>
    ${vx.ma20!=null?`<div style="font-size:10px;color:var(--muted);margin-top:4px">20d avg ${num(vx.ma20,1)}</div>`:""}
    ${vxSpark}
    <div class="mbody tile-mbody"><div class="primer">${esc(PRIMERS.vix||"Expected 30-day S&P volatility. Above 30=fear, above 40=capitulation.")}</div></div>`;
  wireTileInfo(t3,"vix");
  heroRow.appendChild(t3);

  // Tile 4: Consumer Sentiment
  const t4=el(`<div class="ov-score-card"></div>`);
  t4.innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
      <div class="ov-score-label" style="margin-bottom:0">Consumer Sentiment</div>
      <button class="info tile-info-btn" aria-label="Explain Consumer Sentiment" aria-expanded="false">i</button>
    </div>
    <div class="ov-big-num" style="color:${umcol};font-size:42px">${umv==null?"—":Math.round(umv)}</div>
    <div class="ov-risk-label" style="color:${umcol};font-size:13px">${esc(umlbl)}</div>
    <div style="font-size:10px;color:var(--muted);margin-top:4px">UMich / 100</div>
    ${umSpark}
    <div class="mbody tile-mbody"><div class="primer">${esc(PRIMERS.umich_sentiment||"University of Michigan consumer sentiment. Below 60=pessimistic.")}</div></div>`;
  wireTileInfo(t4,"umich_sentiment");
  heroRow.appendChild(t4);
  c.appendChild(heroRow);

  // gradient meter below market health tile (full width strip)
  const meterStrip=el(`<div style="margin:-4px 0 10px;padding:0 2px"></div>`);
  meterStrip.innerHTML=`<div class="ov-meter"><div class="ov-marker" style="left:calc(${pos}% - 1.5px)"></div></div><div class="ov-meter-scale"><span>0 Safe</span><span>25</span><span>50</span><span>75</span><span>100 Risk</span></div>`;
  c.appendChild(meterStrip);

  // ── key drivers ──
  const drivers=deriveKeyDrivers();
  const kd=el(`<div class="kd-grid"></div>`);
  const kdSparkFields=["composite","composite","pct_above_200","hy_oas","composite"];
  drivers.forEach((d,i)=>{
    const fld=kdSparkFields[i];
    const vals=fld?hist.map(h=>h[fld]).filter(v=>v!=null).slice(-20):[];
    const spkCol=d.col||"var(--muted)";
    let spkSvg="";
    if(vals.length>=4){
      const n=vals.length,mn=Math.min(...vals),mx=Math.max(...vals),rg=(mx-mn)||1;
      const W=50,H=16,p=1;
      let pts="";for(let j=0;j<n;j++){const x=p+(j/(n-1))*(W-2*p);const y=p+(1-(vals[j]-mn)/rg)*(H-2*p);pts+=(j?" ":"")+x.toFixed(1)+","+y.toFixed(1);}
      spkSvg=`<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="margin-top:4px;opacity:.55"><polyline points="${pts}" fill="none" stroke="${spkCol}" stroke-width="1.2"/></svg>`;
    }
    const tile=el(`<div class="kd-tile"></div>`);
    tile.innerHTML=`<div class="kd-name">${esc(d.name)}</div>
      <div class="kd-val" style="color:${d.col}">${esc(d.lbl)}</div>
      ${spkSvg}
      <div class="kd-tooltip">${esc(d.tip)}</div>`;
    kd.appendChild(tile);
  });
  c.appendChild(el(`<div class="card" style="padding:12px 14px"><div class="ov-score-label" style="margin-bottom:10px">Key Drivers</div></div>`));
  c.lastChild.appendChild(kd);

  // ── alerts ──
  const alerts=deriveAlerts(DATA);
  const a=el(`<div class="card"><h2>Active Alerts</h2></div>`);
  if(!alerts.length)a.appendChild(el(`<div class="empty">No alerts firing — conditions within normal ranges.</div>`));
  else alerts.forEach(x=>{
    const col=x.pri==="HIGH"?"var(--high)":"var(--moderate)";
    a.appendChild(el(`<div class="alert"><span class="adot" style="background:${col}"></span><div style="font-size:13.5px">${esc(x.txt)}</div><span class="pri ${x.pri}">${x.pri}</span></div>`));
  });
  c.appendChild(a);

  // ── what's changed + next catalysts (side by side) ──
  const pairRow=el(`<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px"></div>`);
  let pairHasContent=false;

  // left tile: what's changed
  if(hist.length>=2){
    const wc=el(`<div class="card" style="margin-bottom:0;height:100%"><h2>What's Changed</h2></div>`);
    const lookback=Math.min(7,hist.length-1);
    const fields=[
      {k:"composite",label:"Market Health",highIsBad:true},
      {k:"goldman",label:"Goldman Risk",highIsBad:true},
      {k:"yield_curve",label:"Yield Curve",highIsBad:false},
      {k:"pct_above_200",label:"Breadth",highIsBad:false},
      {k:"hy_oas",label:"HY Spreads",highIsBad:true},
      {k:"vix",label:"VIX",highIsBad:true},
      {k:"cape",label:"CAPE",highIsBad:true},
    ];
    let rows=0;
    fields.forEach(f=>{
      const cur=hist[hist.length-1][f.k];
      const old7=hist[hist.length-1-lookback][f.k];
      if(cur==null||old7==null)return;
      const delta=parseFloat((cur-old7).toFixed(1));
      if(Math.abs(delta)<0.05)return;
      rows++;
      const worsening=f.highIsBad?delta>0:delta<0;
      const col=worsening?"var(--high)":"var(--low)";
      const arr=delta>0?"↑":"↓";
      wc.appendChild(el(`<div class="wc-row"><span class="wc-arr" style="color:${col}">${arr}</span><span style="flex:1">${esc(f.label)}</span><span class="wc-delta" style="color:${col}">${delta>0?"+":""}${delta}</span></div>`));
    });
    const lbl=lookback===1?"vs yesterday":`vs ${lookback}d ago`;
    if(rows===0)wc.appendChild(el(`<div class="empty">No significant changes</div>`));
    wc.appendChild(el(`<div style="font-size:10px;color:var(--muted);margin-top:6px">${esc(lbl)}</div>`));
    pairRow.appendChild(wc);
    pairHasContent=true;
  }

  // right tile: next catalysts
  const cats=((DATA.catalysts||{}).upcoming||[]).filter(x=>x.days_away<=45);
  const cc3=el(`<div class="card" style="margin-bottom:0;height:100%"><h2>Next Catalysts</h2></div>`);
  if(cats.length){
    cats.forEach(ev=>{
      const w=ev.days_away===0?"today":ev.days_away+"d";
      const chip=el(`<div style="display:flex;justify-content:space-between;align-items:baseline;padding:6px 0;border-top:1px solid var(--border)"></div>`);
      chip.innerHTML=`<div><div style="font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.06em;text-transform:uppercase">${esc(ev.date.slice(5))}</div><div style="font-size:13px;font-weight:600;margin-top:1px">${esc(ev.label)}</div></div><div style="font-size:11px;color:var(--faint);white-space:nowrap;margin-left:8px">${esc(w)}</div>`;
      cc3.appendChild(chip);
    });
  } else {
    cc3.appendChild(el(`<div class="empty">No events in next 45 days</div>`));
  }
  pairRow.appendChild(cc3);
  pairHasContent=true;

  if(pairHasContent)c.appendChild(pairRow);

  // ── summary ──
  const itp=DATA.interpretation||{};
  if(itp.summary)c.appendChild(el(`<div class="card"><h2>Where It Stands</h2><div class="summary">${esc(itp.summary)}</div></div>`));

  // ── model confidence (bottom) ──
  c.appendChild(confCard());
  return c;
}

  const col=v<25?"var(--high)":v<45?"var(--elevated)":v<55?"var(--moderate)":v<75?"var(--low)":"#00c896";
  const compNames={momentum:"Momentum",strength:"Price Strength",breadth:"Breadth",
    volatility:"Volatility",junk_demand:"HY Demand",safe_haven:"Safe Haven"};

  c.appendChild(el(`<div style="display:flex;align-items:center;gap:16px;padding:8px 0 4px">
    <div style="width:72px;height:72px;border-radius:50%;border:5px solid ${col};display:flex;flex-direction:column;align-items:center;justify-content:center;flex:none">

    </div>
    <div>
      <div style="font-size:18px;font-weight:700;color:${col}">${esc(lbl)}</div>
      <div style="font-size:12px;color:var(--muted);margin-top:3px">0 = Extreme Fear · 100 = Extreme Greed</div>
      <div style="font-size:11px;color:var(--faint);margin-top:2px">6/7 CNN inputs · put/call excluded (source down)</div>
    </div>
  </div>`));
  // Component bars
  const keys=Object.keys(comps);
  if(keys.length){
    const barsDiv=el(`<div style="margin-top:6px;display:grid;gap:3px">`);
    keys.forEach(k=>{
      const cv=comps[k];
      const cc=cv<25?"var(--high)":cv<45?"var(--elevated)":cv<55?"var(--moderate)":cv<75?"var(--low)":"#00c896";
      barsDiv.appendChild(el(`<div style="display:grid;grid-template-columns:90px 1fr 30px;align-items:center;gap:6px">
        <span style="font-size:11px;color:var(--muted)">${esc(compNames[k]||k)}</span>

      </div>`));
    });
    c.appendChild(barsDiv);
  }
  return c;
}

function panelSectors(){
  const c=document.createDocumentFragment();
  const ph=(DATA.sectors||{}).cycle_phase||{};
  const rs=(DATA.sectors||{}).relative_strength||{};
  const card=el(`<div class="card"><h2>Sector Rotation</h2></div>`);
  // cycle phase with ⓘ
  const phDiv=el(`<div style="margin-bottom:4px"><div style="display:flex;align-items:center;gap:6px"><span class="phase">${esc(ph.value||"—")}</span><button class="info" aria-label="Explain cycle phase" aria-expanded="false">i</button></div><div class="phase-sub">LEI ${esc(ph.lei_direction||"—")} · 10y–3m ${ph.yield_curve!=null?num(ph.yield_curve,2):"—"}</div></div>`);
  const phBtn=phDiv.querySelector(".info");
  const phBody=el(`<div class="mbody" style="margin-bottom:8px">${PRIMERS.cycle_phase?`<div class="primer">${esc(PRIMERS.cycle_phase)}</div>`:""}</div>`);
  phBtn.addEventListener("click",()=>{const o=phBody.classList.toggle("open");phBtn.setAttribute("aria-expanded",o);});
  card.appendChild(phDiv);card.appendChild(phBody);
  if(ph.favored_sectors&&ph.favored_sectors.length)
    card.appendChild(el(`<div class="favored">${ph.favored_sectors.map(t=>`<span class="chip">${esc(t)}</span>`).join("")}</div>`));
  const arr=Object.keys(rs).map(k=>({tk:k,...rs[k]})).filter(x=>x.value!=null).sort((a,b)=>b.value-a.value);
  if(arr.length){
    // Rotation verdict: cyclical (risk-on) vs defensive (risk-off) leadership
    const CYC=["XLK","XLY","XLF","XLI"],DEF=["XLU","XLP","XLV"];
    const avg=set=>{const xs=arr.filter(x=>set.includes(x.tk)).map(x=>x.value);return xs.length?xs.reduce((a,b)=>a+b,0)/xs.length:null;};
    const cy=avg(CYC),df=avg(DEF);
    if(cy!=null&&df!=null){
      let txt,col;
      if(cy-df>1){txt="Risk-on — cyclicals leading";col="var(--low)";}
      else if(df-cy>1){txt="Risk-off — defensives leading (late-cycle tell)";col="var(--high)";}
      else{txt="Mixed / rotating — no clear leadership";col="var(--muted)";}
      card.appendChild(el(`<div class="srow" style="grid-template-columns:1fr auto;padding:2px 0 8px"><div style="font-size:13px;font-weight:600;color:${col}">${esc(txt)}</div><div class="phase-sub">cyc ${cy>=0?"+":""}${num(cy,1)} vs def ${df>=0?"+":""}${num(df,1)}</div></div>`));
    }
    const max=Math.max(...arr.map(x=>Math.abs(x.value)),1);
    const n=arr.length;
    arr.forEach((x,i)=>{
      const w=Math.abs(x.value)/max*50;
      const col=x.value>=0?"var(--low)":"var(--high)";
      const isLead=i<3,isLag=i>=n-3;
      const cls=isLead?"srow lead":isLag?"srow lag":"srow mute";
      const tag=isLead?`<span class="stag" style="background:var(--low);color:#04140b">LEAD</span>`:isLag?`<span class="stag" style="background:var(--high);color:#1a0606">LAG</span>`:"";
      card.appendChild(el(`<div class="${cls}">
        <div class="stk">${esc(x.tk)}${tag}</div>
        <div class="sbar"><i style="left:${x.value>=0?"50%":(50-w)+"%"};width:${w}%;background:${col}"></i><span class="mid"></span></div>
        <div class="sval" style="color:${col}">${x.value>=0?"+":""}${num(x.value,1)}</div>
      </div>`));
    });
    card.appendChild(el(`<div class="phase-sub" style="margin-top:8px">3-month relative strength vs SPY (pct pts) · leaders/laggards highlighted, middle muted</div>`));
  }
  c.appendChild(card);
  return c;
}

const TABS=[
  {id:"overview",label:"Overview",render:panelOverview},
  {id:"valuation",label:"Valuation",render:panelValuation},
  {id:"cycle",label:"Cycle",render:panelCycle},
  {id:"trend",label:"Trend & Breadth",render:panelTrend},
  {id:"sentiment",label:"Sentiment",render:panelSentiment},
  {id:"sectors",label:"Sectors",render:panelSectors},
];
let activeTab="overview";

function renderTabs(){
  const bar=document.getElementById("tabs");bar.innerHTML="";
  TABS.forEach(t=>{
    const risk=tabRisk(t.id);
    const dot=risk==null?"var(--faint)":riskColor(risk);
    const b=el(`<button class="tab" role="tab" aria-selected="${t.id===activeTab}"><span class="dot" style="background:${dot}"></span>${t.label}</button>`);
    b.addEventListener("click",()=>{activeTab=t.id;renderTabs();renderPanel();window.scrollTo(0,0);});
    bar.appendChild(b);
  });
}
function renderPanel(){
  const c=document.getElementById("content");c.innerHTML="";
  const t=TABS.find(x=>x.id===activeTab)||TABS[0];
  c.appendChild(t.render());
  const h=DATA.source_health||{};
  document.getElementById("health").textContent=`Sources: ${h.ok||0} live · ${h.proxy||0} proxy · ${h.manual||0} manual · ${h.unavailable||0} unavailable`;
}

function toast(msg,ms){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");clearTimeout(toast._t);toast._t=setTimeout(()=>t.classList.remove("show"),ms||3500);}

async function load(){
  try{
    const r=await fetch(DATA_URL+"?t="+Date.now(),{cache:"no-store"});
    if(!r.ok)throw new Error("HTTP "+r.status);
    DATA=await r.json();
    document.getElementById("updated").textContent="Updated "+((DATA.meta||{}).generated_display||"—");
    renderTabs();renderPanel();
  }catch(e){
    document.getElementById("content").innerHTML=`<div class="card"><h2>Couldn't load data</h2><div class="empty">${esc(e.message)}. Try Refresh, then reload in ~2 minutes.</div></div>`;
  }
}

const TKEY="mhd_gh_pat";
async function doRefresh(){
  let pat=localStorage.getItem(TKEY);
  if(!pat){pat=prompt("Paste your GitHub token (stored on this device only):");if(!pat)return;pat=pat.trim();localStorage.setItem(TKEY,pat);}
  toast("Starting refresh…",2500);
  try{
    const r=await fetch(`https://api.github.com/repos/${REPO}/actions/workflows/${WORKFLOW}/dispatches`,
      {method:"POST",headers:{Authorization:"Bearer "+pat,Accept:"application/vnd.github+json","X-GitHub-Api-Version":"2022-11-28"},body:JSON.stringify({ref:"main"})});
    if(r.status===204)toast("Refresh started — reload in ~1–2 min.",5000);
    else if(r.status===401||r.status===403){localStorage.removeItem(TKEY);toast("Token rejected. Tap Refresh to re-enter.",5000);}
    else toast("Refresh failed (HTTP "+r.status+").",4000);
  }catch(e){toast("Network error triggering refresh.",4000);}
}
document.getElementById("refreshBtn").addEventListener("click",doRefresh);
document.getElementById("resetToken").addEventListener("click",()=>{localStorage.removeItem(TKEY);toast("Stored token cleared.",2500);});
load();
</script>
