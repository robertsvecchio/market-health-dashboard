<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="color-scheme" content="dark" />
<title>Market Health</title>
<style>
  :root{
    --bg:#0E1116; --surface:#161B22; --surface2:#1B2128; --border:#232A33;
    --text:#E6EDF3; --muted:#8B949E; --faint:#6E7681;
    --low:#3FB950; --moderate:#D8A657; --elevated:#E8833A; --high:#F85149; --info:#58A6FF;
    --mono:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased}
  body{padding:env(safe-area-inset-top) 0 calc(env(safe-area-inset-bottom) + 24px)}
  .wrap{max-width:660px;margin:0 auto;padding:16px}
  a{color:var(--info);text-decoration:none}
  header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin:8px 2px 14px}
  .brand{font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);font-weight:600}
  .title{font-size:22px;font-weight:700;letter-spacing:-.01em;margin:2px 0 0}
  .updated{font-size:11px;color:var(--faint);margin-top:4px;font-variant-numeric:tabular-nums}
  .refresh{appearance:none;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:var(--sans);font-size:13px;font-weight:600;padding:9px 13px;border-radius:10px;cursor:pointer;display:inline-flex;align-items:center;gap:7px;white-space:nowrap}
  .refresh:hover{border-color:var(--info)}
  .refresh svg{width:14px;height:14px}
  .tabs{display:flex;gap:6px;overflow-x:auto;padding:4px 2px 10px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{flex:none;display:inline-flex;align-items:center;gap:7px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:13px;font-weight:600;padding:8px 13px;border-radius:10px;cursor:pointer;white-space:nowrap}
  .tab[aria-selected="true"]{color:var(--text);border-color:var(--faint);background:var(--surface2)}
  .tab .dot{width:8px;height:8px;border-radius:50%;flex:none;background:var(--faint)}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px}
  .card h2{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:600;margin:0 0 12px}
  .row{display:flex;align-items:center;justify-content:space-between;gap:12px}
  .score-num{font-family:var(--mono);font-size:54px;font-weight:600;line-height:1;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
  .score-den{font-family:var(--mono);font-size:18px;color:var(--faint)}
  .score-label{font-size:15px;font-weight:700;margin-top:2px}
  .meter{position:relative;height:10px;border-radius:6px;margin:16px 0 6px;opacity:.9;background:linear-gradient(90deg,var(--low) 0 25%,var(--moderate) 25% 50%,var(--elevated) 50% 75%,var(--high) 75% 100%)}
  .meter-marker{position:absolute;top:-5px;width:3px;height:20px;background:#fff;border-radius:2px;box-shadow:0 0 0 2px var(--surface),0 1px 4px rgba(0,0,0,.6)}
  .meter-scale{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;color:var(--faint)}
  .subs{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .sub{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px 14px}
  .sub .k{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:600}
  .sub .v{font-family:var(--mono);font-size:26px;font-weight:600;margin-top:6px;font-variant-numeric:tabular-nums}
  .sub .l{font-size:11.5px;margin-top:2px}
  .summary{font-size:14.5px;line-height:1.55;color:var(--text)}
  .watch div{padding:8px 0;border-top:1px solid var(--border);font-size:13.5px;line-height:1.45}
  .watch div:first-child{border-top:none}
  .watch .arr{color:var(--info);margin-right:6px}
  .alert{display:flex;gap:10px;align-items:flex-start;padding:10px 0;border-top:1px solid var(--border)}
  .alert:first-of-type{border-top:none;padding-top:2px}
  .adot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex:none}
  .pri{font-family:var(--mono);font-size:10px;font-weight:600;padding:2px 6px;border-radius:5px;margin-left:auto;flex:none}
  .pri.HIGH{color:var(--high);background:rgba(248,81,73,.12)}
  .pri.MED{color:var(--moderate);background:rgba(216,166,87,.12)}
  .empty{color:var(--muted);font-size:13px}
  .metric{border-top:1px solid var(--border);padding:12px 0}
  .metric:first-child{border-top:none}
  .mhead{display:flex;align-items:center;gap:10px}
  .mname{font-size:14px;font-weight:600}
  .marrow{font-family:var(--mono);font-size:13px;color:var(--faint)}
  .mval{font-family:var(--mono);font-size:15px;font-variant-numeric:tabular-nums;margin-left:auto;white-space:nowrap}
  .info{appearance:none;border:1px solid var(--border);background:transparent;color:var(--muted);width:22px;height:22px;border-radius:50%;font-size:12px;font-weight:700;cursor:pointer;flex:none;line-height:1;font-style:italic}
  .info:hover{border-color:var(--info);color:var(--info)}
  .mbody{margin-top:9px;font-size:13px;line-height:1.5;color:var(--muted);display:none}
  .mbody.open{display:block}
  .mbody .primer{color:var(--faint)}
  .mbody .reading{color:var(--text);margin-top:6px}
  .badge{font-family:var(--mono);font-size:9.5px;font-weight:600;letter-spacing:.04em;padding:2px 5px;border-radius:4px;margin-left:7px;text-transform:uppercase}
  .b-proxy{color:var(--info);background:rgba(88,166,255,.12)}
  .b-manual{color:var(--moderate);background:rgba(216,166,87,.12)}
  .b-unavailable{color:var(--faint);background:rgba(110,118,129,.12)}
  .b-stale{color:var(--high);background:rgba(248,81,73,.12)}
  .phase{font-family:var(--mono);font-size:16px;font-weight:600}
  .phase-sub{font-size:11.5px;color:var(--muted);margin-top:2px}
  .favored{display:flex;gap:6px;flex-wrap:wrap;margin:12px 0 14px}
  .chip{font-family:var(--mono);font-size:11px;font-weight:600;padding:4px 8px;border-radius:7px;background:rgba(63,185,80,.1);color:var(--low);border:1px solid rgba(63,185,80,.25)}
  .srow{display:grid;grid-template-columns:34px 1fr 52px;align-items:center;gap:10px;padding:5px 0}
  .stk{font-family:var(--mono);font-size:12px;color:var(--muted)}
  .sbar{position:relative;height:6px;background:var(--surface2);border-radius:4px}
  .sbar i{position:absolute;top:0;bottom:0;border-radius:4px}
  .sbar .mid{position:absolute;left:50%;top:-2px;bottom:-2px;width:1px;background:var(--border)}
  .sval{font-family:var(--mono);font-size:12px;text-align:right;font-variant-numeric:tabular-nums}
  .cat{display:flex;align-items:center;gap:12px;padding:9px 0;border-top:1px solid var(--border)}
  .cat:first-of-type{border-top:none;padding-top:2px}
  .cat .cd{font-family:var(--mono);font-size:12px;color:var(--muted);width:48px;flex:none}
  .cat .cw{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--faint)}
  .banner{display:flex;gap:10px;align-items:flex-start;background:rgba(216,166,87,.08);border:1px solid rgba(216,166,87,.25);border-radius:12px;padding:11px 13px;margin-bottom:14px}
  .banner svg{width:16px;height:16px;flex:none;margin-top:1px;color:var(--moderate)}
  .banner .bt{font-size:12.5px;line-height:1.45}
  footer{margin-top:18px;padding:0 2px;color:var(--faint);font-size:11px;line-height:1.6}
  .legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:8px}
  .legend span{display:inline-flex;align-items:center;gap:5px}
  .legend i{width:8px;height:8px;border-radius:2px;display:inline-block}
  .lk{color:var(--faint);text-decoration:underline;cursor:pointer;background:none;border:none;font:inherit;padding:0}
  #toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);opacity:0;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:11px 16px;border-radius:10px;font-size:13px;max-width:90vw;text-align:center;pointer-events:none;transition:opacity .25s,transform .25s;z-index:50}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .skeleton{color:var(--faint);text-align:center;padding:40px 0;font-size:14px}
  @media (prefers-reduced-motion: reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <div class="brand">Market Health</div>
      <h1 class="title">Risk Dashboard</h1>
      <div class="updated" id="updated">Loading…</div>
    </div>
    <button class="refresh" id="refreshBtn">
      <svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 3a5 5 0 1 0 4.546 2.914.75.75 0 0 1 1.364-.626A6.5 6.5 0 1 1 8 1.5V0l3 2.5L8 5V3Z"/></svg>
      Refresh
    </button>
  </header>
  <div class="tabs" id="tabs" role="tablist"></div>
  <div id="content"><div class="skeleton">Loading market data…</div></div>
  <footer>
    <div class="legend">
      <span><i style="background:var(--info)"></i>proxy</span>
      <span><i style="background:var(--moderate)"></i>manual</span>
      <span><i style="background:var(--faint)"></i>unavailable</span>
      <span><i style="background:var(--high)"></i>stale</span>
    </div>
    <div id="health"></div>
    <div style="margin-top:8px">Data via FRED, yfinance, Shiller/multpl, Alpaca (S&amp;P 500 internals), Google Trends. Breadth signals are S&amp;P 500 proxies for NYSE-wide indicators. Not investment advice.</div>
    <div style="margin-top:8px"><button class="lk" id="resetToken">Reset refresh token</button></div>
  </footer>
</div>
<div id="toast"></div>
<script>
"use strict";
const REPO="robertsvecchio/market-health-dashboard";
const WORKFLOW="update_dashboard.yml";
const DATA_URL=`https://raw.githubusercontent.com/${REPO}/main/data/latest.json`;

const PRIMERS={
 cape:"Price vs 10-year inflation-adjusted earnings. A long-run return gauge, not a timing tool — high CAPE means low expected 10-year returns. Long-run average ~17; above 30 has always eventually preceded a bear market.",
 buffett_indicator:"Total US equity value \u00f7 GDP. Buffett called it the best single gauge of where valuations stand. Watch its deviation from trend, not the absolute level (which drifts up over time).",
 excess_cape_yield:"CAPE earnings yield minus the real bond yield \u2014 how much extra you're paid to own stocks over bonds. Low or negative = stocks expensive relative to bonds.",
 forward_pe:"Price vs next-12-month expected earnings. More timely than CAPE. Long-run mean ~16x; above 20\u201322x is historically tied to elevated drawdown risk.",
 ad_line_proxy:"Equal-weight vs cap-weight S&P performance. When equal-weight lags, a few megacaps are carrying the index \u2014 a breadth divergence that often precedes turns.",
 yield_curve_10y3m:"10-year minus 3-month Treasury yield. Inversion (below zero) has preceded every US recession since the 1950s, usually 6\u201318 months ahead \u2014 the best-studied recession signal.",
 hy_oas:"Extra yield demanded to hold risky corporate bonds over Treasuries. Widening spreads signal credit stress and usually lead equity weakness \u2014 the bond market sniffs trouble first.",
 ig_oas:"Investment-grade credit spread. A calmer cousin of high-yield; widening signals broad credit tightening.",
 lei:"OECD Composite Leading Indicator for the US \u2014 forward-looking inputs. Direction matters more than level: rising points to expansion, falling to softening.",
 unemployment:"The unemployment rate. Very low is late-cycle; the danger is the turn \u2014 a rise of ~0.5pt from lows (Sahm rule) has reliably marked recession onset.",
 core_pce:"The Fed's preferred inflation gauge, ex food & energy. Direction vs the 2% target drives Fed policy; re-acceleration pressures rates and stocks.",
 core_cpi:"Core consumer inflation, ex food & energy. Persistent high readings push the Fed toward tighter policy.",
 fed_funds:"The Fed's policy rate. Rate-cut cycles have preceded recent recessions \u2014 easing isn't always bullish, since the Fed usually cuts because something is breaking.",
 umich_sentiment:"University of Michigan survey of consumer mood. Sharp drops signal spending pullbacks; extreme lows can be contrarian.",
 nfci_leverage:"Chicago Fed measure of financial-system leverage. Positive = tighter/more leveraged than average; a buildup raises fragility.",
 cc_delinquency:"Share of credit-card balances past due. Rising delinquencies are an early, independent sign of consumer stress \u2014 they lead the economy by months.",
 auto_delinquency:"Share of auto/consumer loans past due. Tends to crack before mortgages; an early consumer-stress tell.",
 savings_rate:"Personal savings as a share of income. Falling savings + rising delinquencies means spending is increasingly debt-funded \u2014 fragile.",
 debt_service:"Household debt payments as a share of disposable income. High readings leave less cushion for shocks.",
 vix:"The market's expected volatility \u2014 the 'fear index.' Mostly concurrent: spikes with selloffs, not before. Above 40 often marks capitulation bottoms.",
 pct_above_200dma:"Share of S&P 500 stocks above their 200-day average. Above 60% is healthy; below 40% while the index is near highs signals distribution beneath the surface.",
 mcclellan:"A breadth-momentum oscillator from advancers vs decliners. Negative = deteriorating internal momentum. (S&P 500 proxy; sharpens over ~40 daily runs.)",
 hindenburg_omen_today:"Fires when many stocks hit both new highs AND new lows at once \u2014 internal fracturing under a rising index. A single flag is noise; a cluster (2+/30d) is the real warning. (S&P 500 proxy.)",
 titanic_syndrome_today:"Fires when new lows outnumber new highs just after the index made a high \u2014 a lack of confirmation at the top. (S&P 500 proxy.)",
 spx_vs_200dma:"Where the S&P 500 sits vs its 200-day average \u2014 the most-watched trend line. Breaks below a flat or falling 200-DMA have preceded every bear since 2000.",
 dma200_slope:"Direction of the 200-day average. Rising = dips usually buyable; flat/falling turns breaks into structural warnings.",
 weekly_macd:"Weekly trend-momentum. Daily MACD is noisy; the weekly turning negative has preceded every sustained bear since 2000.",
 put_call:"Ratio of put to call option volume. Very low = euphoria (contrarian warning); very high = fear (contrarian opportunity).",
};

function riskColor(v){if(v==null)return"var(--faint)";if(v<=25)return"var(--low)";if(v<=50)return"var(--moderate)";if(v<=75)return"var(--elevated)";return"var(--high)";}
function num(x,dp){return(x==null||isNaN(x))?"\u2014":Number(x).toFixed(dp==null?2:dp);}
function esc(s){return String(s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}
function el(h){const t=document.createElement("template");t.innerHTML=h.trim();return t.content.firstElementChild;}
function daysBetween(a,b){const x=new Date(a),y=new Date(b);if(isNaN(x)||isNaN(y))return null;return Math.round((y-x)/86400000);}
function arrow(m){const d=m&&m.trend&&m.trend.direction;return d==="rising"?"\u2191":d==="falling"?"\u2193":d==="flat"?"\u2192":"";}
function badge(status,stale){if(stale)return'<span class="badge b-stale">stale</span>';if(!status||status==="ok")return"";return`<span class="badge b-${status}">${status}</span>`;}

let DATA=null;

function metric(section,key,label,fmt,readingKey,staleDays){
  const m=(DATA[section]||{})[key];
  const rk=readingKey||key;
  const reading=((DATA.interpretation||{}).readings||{})[rk];
  const primer=PRIMERS[rk];
  let valHtml,stale=false,status;
  if(!m||m.status==="unavailable"||m.value==null){valHtml=`\u2014${badge("unavailable",false)}`;}
  else{status=m.status;if(m.asof){const dd=daysBetween(m.asof,(DATA.meta||{}).generated_utc||new Date().toISOString());stale=dd!=null&&dd>(staleDays||45);}
    valHtml=`${fmt?fmt(m.value,m):esc(m.value)} <span class="marrow">${arrow(m)}</span>${badge(status,stale)}`;}
  const hasBody=primer||reading;
  const card=el(`<div class="metric"><div class="mhead"><span class="mname">${esc(label)}</span>${hasBody?'<button class="info" aria-label="explain">i</button>':''}<span class="mval">${valHtml}</span></div>${hasBody?`<div class="mbody">${primer?`<div class="primer">${esc(primer)}</div>`:''}${reading?`<div class="reading"><b>Today:</b> ${esc(reading)}</div>`:''}</div>`:''}</div>`);
  if(hasBody){const btn=card.querySelector(".info"),body=card.querySelector(".mbody");btn.addEventListener("click",()=>body.classList.toggle("open"));}
  return card;
}
function metricList(specs){
  const c=el(`<div class="card"></div>`);
  specs.forEach(s=>{if(s.h){c.appendChild(el(`<h2 style="margin-top:6px">${s.h}</h2>`));return;}c.appendChild(metric(s.sec,s.key,s.label,s.fmt,s.rk,s.stale));});
  return c;
}
function tabRisk(id){
  const g=(s,k)=>{const m=(DATA[s]||{})[k];return m?m.value:null;};
  if(id==="overview")return g("scores","composite");
  if(id==="valuation")return g("scores","structural_score");
  if(id==="cycle")return g("scores","cycle_score");
  if(id==="trend"){const p=g("breadth","pct_above_200dma");return p==null?null:100-p;}
  if(id==="sentiment"){const v=g("sentiment","vix");return v==null?null:v<15?25:v<20?42:v<30?68:88;}
  return null;
}
function panelOverview(){
  const c=document.createDocumentFragment();
  const issues=[];
  const cape=(DATA.structural||{}).cape;if(cape&&cape.status==="unavailable")issues.push("valuation layer");
  const bu=(DATA.breadth||{}).pct_above_200dma;if(bu&&bu.universe&&bu.universe<400)issues.push(`breadth on ${bu.universe} names`);
  if(issues.length)c.appendChild(el(`<div class="banner"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 1.5 15 14H1L8 1.5Z"/></svg><div class="bt"><b>Some inputs limited:</b> ${esc(issues.join("; "))}. Shown below as unavailable; the score weights only what's live.</div></div>`));
  const comp=(DATA.scores||{}).composite||{};
  const cv=comp.value,pos=cv==null?0:Math.max(0,Math.min(100,cv));
  c.appendChild(el(`<div class="card"><h2>Composite Risk</h2><div><span class="score-num" style="color:${riskColor(cv)}">${cv==null?"\u2014":num(cv,0)}</span><span class="score-den"> / 100</span><div class="score-label" style="color:${riskColor(cv)}">${esc(comp.label||"Unknown")}</div></div><div class="meter"><div class="meter-marker" style="left:calc(${pos}% - 1.5px)"></div></div><div class="meter-scale"><span>0</span><span>25</span><span>50</span><span>75</span><span>100</span></div></div>`));
  const itp=DATA.interpretation||{};
  if(itp.summary)c.appendChild(el(`<div class="card"><h2>Where It Stands</h2><div class="summary">${esc(itp.summary)}</div></div>`));
  if(itp.watch&&itp.watch.length){const w=el(`<div class="card"><h2>Watch / Consider</h2><div class="watch"></div></div>`);const box=w.querySelector(".watch");itp.watch.forEach(x=>box.appendChild(el(`<div><span class="arr">\u2192</span>${esc(x)}</div>`)));c.appendChild(w);}
  const ss=(DATA.scores||{}).structural_score||{},cs=(DATA.scores||{}).cycle_score||{};
  c.appendChild(el(`<div class="subs"><div class="sub"><div class="k">Structural</div><div class="v" style="color:${riskColor(ss.value)}">${ss.value==null?"\u2014":num(ss.value,0)}</div><div class="l" style="color:${riskColor(ss.value)}">${esc(ss.label||"\u2014")}</div></div><div class="sub"><div class="k">Cycle</div><div class="v" style="color:${riskColor(cs.value)}">${cs.value==null?"\u2014":num(cs.value,0)}</div><div class="l" style="color:${riskColor(cs.value)}">${esc(cs.label||"\u2014")}</div></div></div>`));
  const alerts=deriveAlerts(DATA);
  const a=el(`<div class="card"><h2>Active Alerts</h2></div>`);
  if(!alerts.length)a.appendChild(el(`<div class="empty">No alerts firing \u2014 conditions within normal ranges.</div>`));
  else alerts.forEach(x=>{const col=x.pri==="HIGH"?"var(--high)":"var(--moderate)";a.appendChild(el(`<div class="alert"><span class="adot" style="background:${col}"></span><div style="font-size:13.5px">${esc(x.txt)}</div><span class="pri ${x.pri}">${x.pri}</span></div>`));});
  c.appendChild(a);
  const cats=((DATA.catalysts||{}).upcoming||[]).filter(x=>x.days_away<=10);
  if(cats.length){const cc=el(`<div class="card"><h2>Next Catalysts</h2></div>`);cats.forEach(ev=>{const w=ev.days_away===0?"today":ev.days_away+"d";cc.appendChild(el(`<div class="cat"><span class="cd">${esc(ev.date.slice(5))}</span><span>${esc(ev.label)}</span><span class="cw">${w}</span></div>`));});c.appendChild(cc);}
  return c;
}
function panelValuation(){return metricList([
  {sec:"structural",key:"cape",label:"CAPE (Shiller P/E)",fmt:v=>num(v,1)},
  {sec:"structural",key:"buffett_indicator",label:"Buffett Indicator",fmt:(v,m)=>num(v,2)+(m.deviation_z!=null?` (z ${num(m.deviation_z,1)})`:"")},
  {sec:"structural",key:"excess_cape_yield",label:"Excess CAPE Yield",fmt:v=>num(v,2)+"%"},
  {sec:"structural",key:"forward_pe",label:"Forward P/E",fmt:(v,m)=>num(v,1)+(m.vs_mean!=null?` (+${num(m.vs_mean,1)})`:"")},
  {sec:"structural",key:"ad_line_proxy",label:"Breadth divergence (RSP/SPY)",fmt:v=>num(v,3)},
]);}
function panelCycle(){return metricList([
  {h:"Leading & Rates"},
  {sec:"macro",key:"lei",label:"Leading Indicator (OECD CLI)",fmt:v=>num(v,1),stale:75},
  {sec:"macro",key:"yield_curve_10y3m",label:"Yield Curve 10y\u20133m",fmt:v=>num(v,2),stale:14},
  {sec:"macro",key:"hy_oas",label:"Credit Spread (HY OAS)",fmt:v=>num(v,2)+"%",stale:14},
  {sec:"macro",key:"ig_oas",label:"Credit Spread (IG OAS)",fmt:v=>num(v,2)+"%",stale:14},
  {sec:"macro",key:"fed_funds",label:"Fed Funds Rate",fmt:v=>num(v,2)+"%",stale:30},
  {h:"Inflation & Labor"},
  {sec:"macro",key:"core_pce",label:"Core PCE (inflation)",fmt:(v,m)=>m.yoy_pct!=null?num(m.yoy_pct,1)+"% YoY":num(v,1),stale:75},
  {sec:"macro",key:"core_cpi",label:"Core CPI (inflation)",fmt:(v,m)=>m.yoy_pct!=null?num(m.yoy_pct,1)+"% YoY":num(v,1),stale:75},
  {sec:"macro",key:"unemployment",label:"Unemployment",fmt:v=>num(v,1)+"%",stale:75},
  {sec:"macro",key:"umich_sentiment",label:"Consumer Sentiment",fmt:v=>num(v,0),stale:75},
  {h:"Consumer Stress"},
  {sec:"macro",key:"cc_delinquency",label:"Credit-Card Delinquency",fmt:v=>num(v,2)+"%",stale:220},
  {sec:"macro",key:"auto_delinquency",label:"Auto-Loan Delinquency",fmt:v=>num(v,2)+"%",stale:220},
  {sec:"macro",key:"savings_rate",label:"Personal Savings Rate",fmt:v=>num(v,1)+"%",stale:75},
  {sec:"macro",key:"debt_service",label:"Debt Service Ratio",fmt:v=>num(v,2)+"%",stale:220},
  {sec:"macro",key:"nfci_leverage",label:"NFCI Leverage",fmt:v=>num(v,2),stale:30},
]);}
function panelTrend(){return metricList([
  {h:"Trend"},
  {sec:"trend",key:"spx_vs_200dma",label:"S&P 500 vs 200-DMA",fmt:v=>(v>=0?"+":"")+num(v,1)+"%"},
  {sec:"trend",key:"dma200_slope",label:"200-DMA slope",fmt:v=>esc(v)},
  {sec:"trend",key:"weekly_macd",label:"Weekly MACD",fmt:(v,m)=>num(v,1)+(m.bearish?" (bearish)":" (bullish)")},
  {h:"Breadth"},
  {sec:"breadth",key:"pct_above_200dma",label:"% above 200-DMA",fmt:(v,m)=>num(v,0)+"%"+(m.universe?` / ${m.universe}`:"")},
  {sec:"breadth",key:"mcclellan",label:"McClellan Oscillator",fmt:v=>num(v,1)},
  {sec:"breadth",key:"hindenburg_omen_today",label:"Hindenburg Omen",fmt:v=>v?"flag":"clear"},
  {sec:"breadth",key:"titanic_syndrome_today",label:"Titanic Syndrome",fmt:v=>v?"flag":"clear"},
]);}
function panelSentiment(){
  const c=metricList([
    {sec:"sentiment",key:"vix",label:"VIX",fmt:(v,m)=>num(v,1)+(m.ma20!=null?` (20d ${num(m.ma20,1)})`:"")},
    {sec:"sentiment",key:"put_call",label:"Put/Call Ratio",fmt:v=>num(v,2)},
  ]);
  const gt=(DATA.sentiment||{}).google_trends||{};
  const keys=Object.keys(gt).filter(k=>gt[k]&&gt[k].value&&typeof gt[k].value==="object");
  if(keys.length){const card=el(`<div class="card"><h2>Search Interest (Google Trends)</h2></div>`);
    keys.forEach(theme=>{const t=gt[theme];const parts=Object.keys(t.value).map(term=>`${esc(term.split(" ")[0])} ${t.value[term]}`).join(" \u00b7 ");
      card.appendChild(el(`<div class="metric"><div class="mhead"><span class="mname" style="font-size:13px">${esc(theme.replace("_"," "))}</span><span class="mval" style="font-size:13px;color:var(--muted)">${esc(parts)}</span></div></div>`));});
    c.appendChild(card);}
  return c;
}
function panelSectors(){
  const c=document.createDocumentFragment();
  const ph=(DATA.sectors||{}).cycle_phase||{};
  const rs=(DATA.sectors||{}).relative_strength||{};
  const card=el(`<div class="card"><h2>Sector Rotation</h2></div>`);
  card.appendChild(el(`<div class="row"><div><div class="phase">${esc(ph.value||"\u2014")}</div><div class="phase-sub">LEI ${esc(ph.lei_direction||"\u2014")} \u00b7 10y\u20133m ${ph.yield_curve!=null?num(ph.yield_curve,2):"\u2014"}</div></div></div>`));
  if(ph.favored_sectors&&ph.favored_sectors.length)card.appendChild(el(`<div class="favored">${ph.favored_sectors.map(t=>`<span class="chip">${esc(t)}</span>`).join("")}</div>`));
  const arr=Object.keys(rs).map(k=>({tk:k,...rs[k]})).filter(x=>x.value!=null).sort((a,b)=>b.value-a.value);
  if(arr.length){const max=Math.max(...arr.map(x=>Math.abs(x.value)),1);
    arr.forEach(x=>{const w=Math.abs(x.value)/max*50;const col=x.value>=0?"var(--low)":"var(--high)";
      card.appendChild(el(`<div class="srow"><div class="stk">${esc(x.tk)}</div><div class="sbar"><i style="left:${x.value>=0?"50%":(50-w)+"%"};width:${w}%;background:${col}"></i><span class="mid"></span></div><div class="sval" style="color:${col}">${x.value>=0?"+":""}${num(x.value,1)}</div></div>`));});
    card.appendChild(el(`<div class="phase-sub" style="margin-top:8px">3-month relative strength vs SPY (pct pts)</div>`));}
  c.appendChild(card);
  return c;
}
function panelPortfolio(){
  const c=document.createDocumentFragment();
  const p=(DATA.portfolio||{}).roth_ira||{};
  if(!p||p.status==="no_positions"||p.status==="unavailable"){
    c.appendChild(el(`<div class="card"><h2>Roth IRA</h2><div class="empty" style="line-height:1.55">${p.error||"No positions loaded yet."}</div></div>`));
    return c;
  }
  const risk=p.macro_risk_score;const rc=riskColor(risk);
  const betaColor=p.portfolio_beta>1.4?"var(--high)":p.portfolio_beta>1.1?"var(--elevated)":p.portfolio_beta<0.7?"var(--info)":"var(--low)";
  // summary card
  const sc=el(`<div class="card"><h2>Roth IRA · Portfolio Context</h2></div>`);
  sc.appendChild(el(`<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:14px">
    <div style="background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px 14px">
      <div style="font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:600">Portfolio Beta</div>
      <div style="font-family:var(--mono);font-size:26px;font-weight:600;color:${betaColor};margin-top:6px">${num(p.portfolio_beta,2)}</div>
    </div>
    <div style="background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px 14px">
      <div style="font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:600">Avg Sharpe</div>
      <div style="font-family:var(--mono);font-size:26px;font-weight:600;color:var(--text);margin-top:6px">${num(p.portfolio_sharpe,2)}</div>
    </div>
    <div style="background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px 14px">
      <div style="font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:600">Top 5 Wt</div>
      <div style="font-family:var(--mono);font-size:26px;font-weight:600;color:var(--text);margin-top:6px">${num(p.top5_concentration_pct,0)}%</div>
    </div>
  </div>`));
  if(p.risk_score_context)sc.appendChild(el(`<div style="font-size:13.5px;line-height:1.45;padding:10px 12px;background:var(--surface2);border-radius:10px;border:1px solid var(--border)"><span style="color:${rc};font-weight:600">Risk ${num(risk,0)}</span> · ${esc(p.risk_score_context)}</div>`));
  c.appendChild(sc);
  // holdings
  const hc=el(`<div class="card"><h2>Holdings (${p.position_count})</h2></div>`);
  const maxW=Math.max(...(p.holdings||[]).map(h=>h.weight),1);
  (p.holdings||[]).forEach(h=>{
    const sc2=h.sharpe>=1?"var(--low)":h.sharpe>=0?"var(--moderate)":"var(--high)";
    const bc=h.beta>1.3?"var(--elevated)":h.beta<0.7?"var(--info)":"var(--muted)";
    const ret1y=h.ret_1y!=null?(h.ret_1y>=0?`+${h.ret_1y}%`:`${h.ret_1y}%`):"—";
    const retColor=h.ret_1y!=null?(h.ret_1y>=0?"var(--low)":"var(--high)"):"var(--faint)";
    hc.appendChild(el(`<div style="border-top:1px solid var(--border);padding:10px 0">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">
        <span style="font-family:var(--mono);font-size:13px;font-weight:600;width:48px">${esc(h.ticker)}</span>
        <div style="flex:1;background:var(--surface2);border-radius:3px;height:5px"><div style="width:${h.weight/maxW*100}%;height:100%;background:var(--info);border-radius:3px"></div></div>
        <span style="font-family:var(--mono);font-size:12px;color:var(--muted);width:36px;text-align:right">${h.weight}%</span>
      </div>
      <div style="display:flex;gap:16px;font-family:var(--mono);font-size:11.5px;padding-left:56px">
        <span style="color:var(--faint)">$${num(h.value,0)}</span>
        <span>β <span style="color:${bc}">${num(h.beta,2)}</span></span>
        <span>Sharpe <span style="color:${sc2}">${num(h.sharpe,2)}</span></span>
        <span style="color:${retColor}">${ret1y} 1yr</span>
      </div>
    </div>`));
  });
  c.appendChild(hc);
  if(p.skipped&&p.skipped.length)c.appendChild(el(`<div class="card"><div class="empty">Skipped (no price data): ${esc(p.skipped.join(", "))}</div></div>`));
  return c;
}
const TABS=[
  {id:"overview",label:"Overview",render:panelOverview},
  {id:"valuation",label:"Valuation",render:panelValuation},
  {id:"cycle",label:"Cycle",render:panelCycle},
  {id:"trend",label:"Trend & Breadth",render:panelTrend},
  {id:"sentiment",label:"Sentiment",render:panelSentiment},
  {id:"sectors",label:"Sectors",render:panelSectors},
  {id:"portfolio",label:"Portfolio",render:panelPortfolio},
];
let activeTab="overview";
function renderTabs(){
  const bar=document.getElementById("tabs");bar.innerHTML="";
  TABS.forEach(t=>{const risk=tabRisk(t.id);const dot=risk==null?"var(--faint)":riskColor(risk);
    const b=el(`<button class="tab" role="tab" aria-selected="${t.id===activeTab}"><span class="dot" style="background:${dot}"></span>${t.label}</button>`);
    b.addEventListener("click",()=>{activeTab=t.id;renderTabs();renderPanel();window.scrollTo(0,0);});
    bar.appendChild(b);});
}
function renderPanel(){
  const c=document.getElementById("content");c.innerHTML="";
  const t=TABS.find(x=>x.id===activeTab)||TABS[0];
  c.appendChild(t.render());
  const h=DATA.source_health||{};
  document.getElementById("health").textContent=`Sources: ${h.ok||0} live \u00b7 ${h.proxy||0} proxy \u00b7 ${h.manual||0} manual \u00b7 ${h.unavailable||0} unavailable`;
}
function deriveAlerts(d){
  const out=[];const m=d.macro||{},s=d.scores||{},se=d.sentiment||{},b=d.breadth||{},st=d.structural||{};
  const yc=m.yield_curve_10y3m;if(yc&&yc.value!=null){if(yc.value<0)out.push({txt:"Yield curve inverted (10y\u20133m below zero)",pri:"HIGH"});else if(yc.value<0.5)out.push({txt:`Yield curve flat (${num(yc.value,2)})`,pri:"MED"});}
  const hy=m.hy_oas;if(hy&&hy.value!=null&&hy.value>=5)out.push({txt:`Credit spreads widening (HY OAS ${num(hy.value,2)}%)`,pri:hy.value>=7?"HIGH":"MED"});
  const g=s.goldman_composite;if(g){if(g.above_70)out.push({txt:`Goldman composite > 70 (${num(g.value,0)})`,pri:"HIGH"});else if(g.above_50)out.push({txt:`Goldman composite > 50 (${num(g.value,0)})`,pri:"MED"});}
  const vix=se.vix;if(vix){if(vix.above_40)out.push({txt:`VIX > 40 (${num(vix.value,1)})`,pri:"HIGH"});else if(vix.above_30)out.push({txt:`VIX > 30 (${num(vix.value,1)})`,pri:"MED"});}
  const pa=b.pct_above_200dma;if(pa&&pa.below_40)out.push({txt:`Only ${num(pa.value,0)}% of S&P 500 above 200-DMA`,pri:"HIGH"});
  if(b.hindenburg_omen_today&&b.hindenburg_omen_today.value)out.push({txt:"Hindenburg Omen flag today (watch for cluster)",pri:"MED"});
  if(b.titanic_syndrome_today&&b.titanic_syndrome_today.value)out.push({txt:"Titanic Syndrome flag today",pri:"MED"});
  if(st.excess_cape_yield&&st.excess_cape_yield.low)out.push({txt:"Excess CAPE Yield low \u2014 stocks expensive vs bonds",pri:"MED"});
  const ord={HIGH:0,MED:1};out.sort((a,b)=>ord[a.pri]-ord[b.pri]);return out;
}
function toast(msg,ms){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");clearTimeout(toast._t);toast._t=setTimeout(()=>t.classList.remove("show"),ms||3500);}
async function load(){
  try{
    const r=await fetch(DATA_URL+"?t="+Date.now(),{cache:"no-store"});
    if(!r.ok)throw new Error("HTTP "+r.status);
    DATA=await r.json();
    document.getElementById("updated").textContent="Updated "+((DATA.meta||{}).generated_display||"\u2014");
    renderTabs();renderPanel();
  }catch(e){document.getElementById("content").innerHTML=`<div class="card"><h2>Couldn't load data</h2><div class="empty">${esc(e.message)}. The latest run may have failed. Try Refresh, then reload in ~2 minutes.</div></div>`;}
}
const TKEY="mhd_gh_pat";
async function doRefresh(){
  let pat=localStorage.getItem(TKEY);
  if(!pat){pat=prompt("Paste your GitHub token (stored on this device only):");if(!pat)return;pat=pat.trim();localStorage.setItem(TKEY,pat);}
  toast("Starting refresh\u2026",2500);
  try{
    const r=await fetch(`https://api.github.com/repos/${REPO}/actions/workflows/${WORKFLOW}/dispatches`,{method:"POST",headers:{Authorization:"Bearer "+pat,Accept:"application/vnd.github+json","X-GitHub-Api-Version":"2022-11-28"},body:JSON.stringify({ref:"main"})});
    if(r.status===204)toast("Refresh started \u2014 reload in ~1\u20132 min.",5000);
    else if(r.status===401||r.status===403){localStorage.removeItem(TKEY);toast("Token rejected. Tap Refresh to re-enter.",5000);}
    else toast("Refresh failed (HTTP "+r.status+").",4000);
  }catch(e){toast("Network error triggering refresh.",4000);}
}
document.getElementById("refreshBtn").addEventListener("click",doRefresh);
document.getElementById("resetToken").addEventListener("click",()=>{localStorage.removeItem(TKEY);toast("Stored token cleared.",2500);});
load();
</script>
